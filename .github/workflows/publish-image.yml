name: Publish image

# Builds the simengine container and pushes it to GitHub Container Registry
# (ghcr.io/paupier/simengine). Portainer then pulls this pre-built image
# instead of building from the repo.
#
# Tags produced:
#   - `latest`            on every push to main
#   - `main-<shortsha>`   on every push to main (immutable, for pinning)
#   - `vX.Y.Z` + `X.Y`    when you push a git tag like v0.2.0
# Trigger a rebuild by hand from the Actions tab via "Run workflow".

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # paupier/simengine

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # required to push to GHCR

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no PAT needed

    - name: Derive image tags and labels
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=main-,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        push: true
        # All optional extras baked in so the deployed image works whether the
        # stack enables influx, graph, SparkplugB, or the assistant chat.
        build-args: |
          EXTRAS=historian-influx,historian-neo4j,sparkplug,chat
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
