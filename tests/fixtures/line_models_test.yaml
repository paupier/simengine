advanced_failure_line:
  description: 2-machine line with realistic MTTF/MTTR distributions and multiple
    failure types
  machines:
  - name: M1
    cycle_time: 1
    enable_advanced_failures: true
    failure_modes:
    - name: mechanical
      type: wearout
      mttf:
        distribution: weibull
        shape: 2.5
        scale: 500
      mttr:
        distribution: lognormal
        mean: 15
        std: 5
    - name: electrical
      type: random
      mttf:
        distribution: exponential
        mean: 1000
      mttr:
        distribution: lognormal
        mean: 10
        std: 3
    maintenance_strategy:
      type: predictive
      cbm_threshold: 1
  - name: M2
    cycle_time: 1
    enable_degradation: false
  buffers:
  - name: B1
    capacity: 10
    upstream: M1
    downstream: M2
  maintainer:
    enabled: true
    capacity: 1
historian_line:
  description: 2-machine line with event historian logging to CSV
  machines:
  - name: M1
    cycle_time: 1
    enable_degradation: true
    defect_rate: 0.02
    health_multiplier: 5.0
  - name: M2
    cycle_time: 1
    defect_rate: 0.005
  buffers:
  - name: B1
    capacity: 10
    upstream: M1
    downstream: M2
  maintainer:
    enabled: true
    capacity: 1
  shifts:
    schedule:
    - name: Day Shift
      duration: 28800
      start_offset: 0
    - name: Night Shift
      duration: 28800
      start_offset: 28800
  historian:
    enabled: true
    csv:
      enabled: true
      output_dir: results/historian
      max_file_size_mb: 50
      rotate_on_shift: true
    influxdb:
      enabled: false
      url: http://localhost:8086
      token: ${INFLUXDB_TOKEN}
      org: simantha
      bucket: manufacturing
      batch_size: 100
    neo4j:
      enabled: false
      uri: bolt://localhost:7687
      user: neo4j
      password: ${NEO4J_PASSWORD}
      track_parts: true
      max_parts: 10000
    events:
      state_changes: true
      alarms: true
      shift_changes: true
      maintenance: true
      spc_violations: true
      buffer_level_changes: true
      production_summary: true
      production_summary_interval: 60
balanced_line:
  machines:
  - name: M1
    cycle_time: 1.0
    failure_rate: 0.0
    repair_time: 10.0
  - name: M2
    cycle_time: 1.0
    failure_rate: 0.0
    repair_time: 10.0
  buffers:
  - name: B1
    capacity: 10
    upstream: M1
    downstream: M2
full_feature_line:
  machines:
  - name: M1
    cycle_time: 1
    enable_spc: true
    spc:
      characteristic: cycle_time
      subgroup_size: 5
      num_subgroups: 25
      usl: 1.2
      lsl: 0.8
      target: 1
      enable_western_electric: true
    enable_advanced_failures: true
    failure_modes:
    - name: mechanical
      type: wearout
      mttf:
        distribution: weibull
        shape: 2.5
        scale: 800
      mttr:
        distribution: lognormal
        mean: 15
        std: 5
    - name: electrical
      type: random
      mttf:
        distribution: exponential
        mean: 1200
      mttr:
        distribution: lognormal
        mean: 10
        std: 3
    maintenance_strategy:
      type: predictive
      cbm_threshold: 1
    quality_routing:
      enabled: true
      mode: scrap_and_rework
      defect_rate: 0.05
      health_multiplier: 5
      enable_health_correlation: true
      rework_success_rate: 0.7
      max_rework: 3
      scrap_sink: ScrapBin1
  - name: M2
    cycle_time: 1
    enable_spc: true
    spc:
      characteristic: cycle_time
      subgroup_size: 5
      num_subgroups: 25
      usl: 1.15
      lsl: 0.85
      target: 1
      enable_western_electric: true
    enable_advanced_failures: true
    quality_routing:
      enabled: true
      mode: scrap
      defect_rate: 0.02
      scrap_sink: ScrapBin2
  buffers:
  - name: B1
    capacity: 10
    upstream: M1
    downstream: M2
  maintainer:
    enabled: true
    capacity: 1
  shifts:
    schedule:
    - name: Day Shift
      duration: 28800
      start_offset: 0
    - name: Evening Shift
      duration: 28800
      start_offset: 28800
    - name: Night Shift
      duration: 28800
      start_offset: 57600
  historian:
    enabled: true
    csv:
      enabled: true
      output_dir: results/historian
      max_file_size_mb: 50
      rotate_on_shift: true
    influxdb:
      enabled: false
      url: http://localhost:8086
      token: ${INFLUXDB_TOKEN}
      org: simantha
      bucket: manufacturing
      batch_size: 100
    neo4j:
      enabled: false
      uri: bolt://localhost:7687
      user: neo4j
      password: ${NEO4J_PASSWORD}
      track_parts: true
      max_parts: 10000
    events:
      state_changes: true
      alarms: true
      shift_changes: true
      maintenance: true
      spc_violations: true
      buffer_level_changes: true
      production_summary: true
      production_summary_interval: 60
  scrap_sinks:
  - name: ScrapBin1
  - name: ScrapBin2
  description: '2-machine line with ALL features: advanced failures, SPC, shifts,
    historian, scrap & rework routing'
