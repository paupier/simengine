# Test fixture scenarios (§3 schema). Loaded via SIMENGINE_CONFIG_PATH by
# tests/conftest.py so tests are independent of config/scenarios.yaml.

balanced_line:
  description: "Two identical stations for recipe/validation tests"
  stations:
    - name: M1
      cycle_time: 1.0
    - name: M2
      cycle_time: 1.0
  buffers:
    - {name: B1, capacity: 10}

full_feature_line:
  description: "Feature-rich fixture: health, failure modes, stops, PVs"
  enterprise: "TestCorp"
  site: "TestSite"
  area: "TestArea"
  line_name: "TestLine"
  warm_up_time: 0
  stations:
    - name: M1
      cycle_time: 2.0
      defect_rate: 0.05
      health:
        h_max: 3
        p_degrade: 0.01
        mttr: {distribution: lognormal, mean: 20, std: 5}
      failure_modes:
        - name: mechanical
          type: wearout
          mttf: {distribution: weibull, shape: 2.0, scale: 2000}
          mttr: {distribution: lognormal, mean: 30, std: 10}
      cycle_stops:
        - reason: CS_JAM
          mtbe: {distribution: exponential, mean: 200}
          duration: {distribution: lognormal, mean: 10, std: 3}
      process_values:
        - name: OilTemp
          unit: degC
          profile: first_order_lag
          setpoint: 55.0
          tau: 60
          initial: 20.0
          noise: {distribution: normal, mean: 0, std: 0.2}
          health_drift: 0.05
          alarm_high: 68
      spc:
        enabled: true
    - name: M2
      cycle_time: 2.0
      defect_rate: 0.02
  buffers:
    - {name: B1, capacity: 5}
  comms:
    opcua: {enabled: true, port: 4840}
  historians: []

advanced_failure_line:
  description: "Two stations with competing-risk failure modes"
  stations:
    - name: M1
      cycle_time: 3.0
      health:
        h_max: 2
        p_degrade: 0.02
        mttr: {distribution: lognormal, mean: 15, std: 4}
      failure_modes:
        - name: mechanical
          type: wearout
          mttf: {distribution: weibull, shape: 2.0, scale: 1000}
          mttr: {distribution: lognormal, mean: 30, std: 10}
        - name: electrical
          type: random
          mttf: {distribution: exponential, mean: 3000}
          mttr: {distribution: lognormal, mean: 15, std: 5}
    - name: M2
      cycle_time: 3.0
  buffers:
    - {name: B1, capacity: 5}
