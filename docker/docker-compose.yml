# simengine core stack.
#
# Services:
#   mosquitto — MQTT broker serving plain MQTT, OPC UA PubSub JSON, and SparkplugB
#   simengine — engine + REST/UI (added when the Dockerfile lands in Phase 4/6)
#
# Optional profiles (Phase 6): influx (influxdb + telegraf + grafana), graph (neo4j).

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: simengine-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

volumes:
  mosquitto-data:
