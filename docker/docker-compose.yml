# simengine stack.
#
# Default services (plain `docker compose up`):
#   simengine — engine + REST/UI (:8080) + OPC UA (:4840)
#   mosquitto — MQTT broker serving plain MQTT, OPC UA PubSub JSON, SparkplugB
#
# Optional profiles:
#   --profile influx  -> influxdb (event historian target; Grafana/Telegraf
#                        port from the parent stack is deferred)
#   --profile graph   -> neo4j (graph historian target)

services:
  simengine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        EXTRAS: ${SIMENGINE_EXTRAS:-}
    container_name: simengine
    ports:
      - "8080:8080"
      - "4840:4840"
    environment:
      SIMENGINE_CONFIG_PATH: /app/config/scenarios.yaml
      SIMENGINE_HISTORIAN_DIR: /app/results/historian
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
    volumes:
      - ../config:/app/config
      - simengine-results:/app/results

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: simengine-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

  influxdb:
    image: influxdb:2.7
    container_name: simengine-influxdb
    profiles: ["influx"]
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-simengine-dev}
      DOCKER_INFLUXDB_INIT_ORG: simengine
      DOCKER_INFLUXDB_INIT_BUCKET: manufacturing
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-simengine-dev-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: simengine-neo4j
    profiles: ["graph"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-simengine-dev}
    volumes:
      - neo4j-data:/data

volumes:
  mosquitto-data:
  simengine-results:
  influxdb-data:
  neo4j-data:
