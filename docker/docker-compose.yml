###############################################################################
# Simantha OPC UA Digital Twin - Docker Compose Stack
#
# Deploy via Portainer:
#   Stacks > Add Stack > Repository
#   URL: https://github.com/paupier/simantha-opcua
#   Compose path: docker/docker-compose.yml
#
# Or locally:
#   docker compose -f docker/docker-compose.yml up --build -d
#
# Services:
#   - simantha:  Web UI (:8080) + OPC UA server (:4840)
#   - influxdb:  Time-series historian (:8086)
#   - grafana:   Dashboards (:3000)
#   - mosquitto: MQTT broker (:1883)
#
# Default credentials:
#   Grafana:  admin / simantha
#   InfluxDB: admin / simantha123 (token: simantha-dev-token)
###############################################################################

services:
  # -------------------------------------------------------------------------
  # Simantha Digital Twin (Web UI + OPC UA Simulation)
  # -------------------------------------------------------------------------
  simantha:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - BUILD_SHA=${BUILD_SHA:-dev}
    container_name: simantha-sim
    ports:
      - "8080:8080"    # Web UI - scenario selection, controls, live KPIs
      - "4840:4840"    # OPC UA - connect with UA Expert, Node-RED, SCADA
    environment:
      - BUILD_SHA=${BUILD_SHA:-dev}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=simantha-dev-token
      - INFLUXDB_ORG=simantha
      - INFLUXDB_BUCKET=manufacturing
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-simantha123}
    volumes:
      - sim-data:/app/results
      - telegraf-conf:/etc/telegraf
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      influxdb:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - simantha-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # InfluxDB 2.x - Time-Series Historian Backend
  # -------------------------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: simantha-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=simantha123
      - DOCKER_INFLUXDB_INIT_ORG=simantha
      - DOCKER_INFLUXDB_INIT_BUCKET=manufacturing
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=simantha-dev-token
    volumes:
      - influx-data:/var/lib/influxdb2
    networks:
      - simantha-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Grafana - Dashboards (auto-provisioned with InfluxDB datasource)
  # -------------------------------------------------------------------------
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: simantha-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=simantha
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - simantha-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Telegraf - OPC UA → InfluxDB Pipeline Validation
  # -------------------------------------------------------------------------
  telegraf:
    image: telegraf:latest
    container_name: simantha-telegraf
    command: ["telegraf", "--watch-config", "poll"]
    volumes:
      - telegraf-conf:/etc/telegraf
    depends_on:
      - simantha
      - influxdb
    networks:
      - simantha-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Neo4j - Graph Database (causal analytics)
  # -------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: simantha-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-simantha123}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - simantha-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # NeoDash - Graph Dashboard Builder
  # -------------------------------------------------------------------------
  neodash:
    image: neo4jlabs/neodash:latest
    container_name: simantha-neodash
    ports:
      - "5005:5005"
    depends_on:
      - neo4j
    networks:
      - simantha-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Prometheus - Metrics collection (scrapes cAdvisor + node-exporter)
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: simantha-prometheus
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - simantha-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # cAdvisor - Per-container CPU/memory/network/disk metrics
  # -------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: simantha-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    networks:
      - simantha-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # node-exporter - Host machine CPU/memory/disk/network metrics
  # -------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: simantha-node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - simantha-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Eclipse Mosquitto 2.0 - MQTT Broker (OPC UA PubSub transport)
  # -------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: simantha-mosquitto
    ports:
      - "1883:1883"      # MQTT
      - "9001:9001"      # WebSocket (for browser MQTT clients)
    volumes:
      - ./mosquitto:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - simantha-net
    restart: unless-stopped

volumes:
  sim-data:
    name: simantha-sim-data
  prometheus-data:
    name: simantha-prometheus-data
  influx-data:
    name: simantha-influx-data
  grafana-data:
    name: simantha-grafana-data
  telegraf-conf:
    name: simantha-telegraf-conf
  neo4j-data:
    name: simantha-neo4j-data
  neo4j-logs:
    name: simantha-neo4j-logs
  mosquitto-data:
    name: simantha-mosquitto-data
  mosquitto-log:
    name: simantha-mosquitto-log

networks:
  simantha-net:
    name: simantha-network
    driver: bridge
