<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simantha - Config Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .yaml-preview {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }
        .machine-section {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            background: white;
        }
        .buffer-section {
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .remove-btn { cursor: pointer; color: #dc3545; font-size: 1.2rem; }
        .remove-btn:hover { color: #b02a37; }
        .help-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; border-radius: 50%;
            background: #e9ecef; color: #6c757d;
            font-size: 0.65rem; font-weight: bold; cursor: help;
            margin-left: 3px; vertical-align: middle;
        }
        .help-icon:hover { background: #0d6efd; color: white; }
        .ppm-formula { font-size: 0.75rem; color: #6c757d; font-style: italic; margin-top: 2px; }
        #scenario-description { font-size: 0.85rem; color: #6c757d; margin-top: 4px; }
        .feature-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .feature-badge {
            font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
            background: #e9ecef; color: #495057;
        }
        .feature-badge.active { background: #0d6efd22; color: #0d6efd; border: 1px solid #0d6efd44; }
        .feature-badge.active-green { background: #19875422; color: #198754; border: 1px solid #19875444; }
        .feature-badge.active-orange { background: #fd7e1422; color: #fd7e14; border: 1px solid #fd7e1444; }
        .feature-badge.active-purple { background: #6f42c122; color: #6f42c1; border: 1px solid #6f42c144; }
        .detail-panel {
            font-size: 0.78rem; color: #495057;
            background: #f8f9fa; border-radius: 6px;
            padding: 10px 12px; margin-top: 8px;
            border-left: 3px solid #0d6efd;
        }
        .detail-panel dt { font-weight: 600; color: #212529; }
        .detail-panel dd { margin-bottom: 4px; margin-left: 0; }
        .detail-toggle {
            font-size: 0.75rem; color: #6c757d; cursor: pointer;
            border: none; background: none; padding: 0;
        }
        .detail-toggle:hover { color: #0d6efd; }
        .feature-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
        .feature-item { display: flex; align-items: center; gap: 4px; }
        .degradation-inline { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
        .degradation-inline label { font-size: 0.75rem; color: #6c757d; margin: 0; white-space: nowrap; }
        .degradation-inline input { width: 65px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a href="/" class="navbar-brand mb-0 h1">Simantha Digital Twin</a>
            <div>
                <a href="/" class="btn btn-sm btn-outline-light me-2">Dashboard</a>
                <a href="/reports" class="btn btn-sm btn-outline-info me-2">Reports</a>
                <a href="/runs" class="btn btn-sm btn-outline-light me-2">Runs</a>
                <a href="/validation" class="btn btn-sm btn-outline-warning me-2">Validation</a>
                <a href="/config" class="btn btn-sm btn-outline-light me-2">Config</a>
                <a href="/recipes" class="btn btn-sm btn-outline-light me-2">Recipes</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Left: Form -->
            <div class="col-md-7">
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between">
                        <strong>Scenario Editor</strong>
                        <div>
                            <select id="scenario-select" class="form-select form-select-sm d-inline-block" style="width:auto;"
                                    onchange="loadScenario(this.value)"></select>
                            <button class="btn btn-sm btn-outline-primary ms-2" onclick="newScenario()">New</button>
                        </div>
                    </div>
                    <div id="scenario-description" class="px-3 pt-2"></div>
                    <div class="card-body">
                        <div id="alert-area"></div>

                        <!-- Scenario name (for new scenarios) -->
                        <div class="mb-3" id="name-group" style="display:none;">
                            <label class="form-label">Scenario Name</label>
                            <input type="text" id="scenario-name" class="form-control" placeholder="my_custom_line">
                        </div>

                        <!-- Machines -->
                        <h6>Machines</h6>
                        <div id="machines-container"></div>
                        <button class="btn btn-sm btn-outline-success mb-3" onclick="addMachine()">+ Add Machine</button>

                        <!-- Buffers (auto-generated info) -->
                        <h6>Buffers</h6>
                        <div id="buffers-container"></div>

                        <!-- Line-level settings -->
                        <h6>Line Settings</h6>
                        <div class="row g-2 mb-3">
                            <div class="col-md-4">
                                <label class="form-label small">Warm-Up Time (s)
                                    <span class="help-icon" data-bs-toggle="tooltip" data-bs-placement="top"
                                        title="Seconds of warm-up before data collection starts. During warm-up, the simulation runs but metrics (sink.level, parts_made, OEE) are not recorded. Use this to reach steady-state before measuring performance. Typical values: 300-600s for lines with failures.">?</span>
                                </label>
                                <input type="number" class="form-control form-control-sm" id="warm-up-time" value="0" min="0" step="60" placeholder="0">
                            </div>
                        </div>

                        <h6>Line-Level Features</h6>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="feat-maintainer">
                                    <label class="form-check-label" for="feat-maintainer">Maintainer
                                        <span class="help-icon" data-bs-toggle="tooltip" data-bs-placement="top"
                                            title="Shared repair resource that services failed machines. Required when machines have degradation or failure modes. Supports FIFO, SPT, priority, and bottleneck scheduling strategies.">?</span>
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="feat-shifts">
                                    <label class="form-check-label" for="feat-shifts">Shifts
                                        <span class="help-icon" data-bs-toggle="tooltip" data-bs-placement="top"
                                            title="Shift rotation system (e.g. 3 x 8-hour shifts). Production metrics reset at each shift boundary. Shift-level KPIs are tracked separately and published via OPC UA.">?</span>
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="feat-historian">
                                    <label class="form-check-label" for="feat-historian">Historian
                                        <span class="help-icon" data-bs-toggle="tooltip" data-bs-placement="top"
                                            title="Event logging to CSV, InfluxDB, or Neo4j. Only logs state transitions (not every simulation step) for efficient storage. Enables the Reports and Validation pages.">?</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" id="btn-save" onclick="saveScenario()">Save</button>
                            <button class="btn btn-outline-secondary" onclick="previewYaml()">Preview YAML</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: YAML Preview -->
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header"><strong>YAML Preview</strong></div>
                    <div class="card-body">
                        <div class="yaml-preview" id="yaml-preview">Select a scenario or click "Preview YAML" to see the config.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isNewScenario = false;
        let currentScenario = null;
        let scenarioData = null;
        let scenarioMeta = {};

        // --- Tooltip content (longer explanations) ---
        const TIPS = {
            name: 'Unique machine identifier (e.g. M1, M2). Used in topology routing and OPC UA node naming. Must match buffer upstream/downstream references.',
            cycle: 'Time in seconds to process one part. Lower = faster. If Target PPM is set, this field is calculated automatically (cycle = 60 / PPM).',
            ppm: 'Target parts per minute. When set, overrides Cycle Time (cycle = 60 / PPM). Leave empty to set Cycle Time directly instead.',
            defect: 'Probability (0.0 to 1.0) that each produced part is defective. With Quality Routing enabled, defective parts are sent to scrap sinks or rework. Without it, defects are counted but parts still flow normally.',
            spc: 'Statistical Process Control: monitors process variation using X-bar/R control charts and calculates Cp/Cpk capability indices. Detects out-of-control conditions via Western Electric rules.',
            failures: 'Advanced failure modes with statistical MTTF/MTTR distributions (Weibull, exponential, lognormal). Supports multiple competing failure modes per machine (e.g. mechanical + electrical).',
            qr: 'Routes defective parts to scrap sinks or rework stations. Supports health-correlated defect rates (machines degrade = more defects). Rework has configurable success rate and max attempts.',
            degradation: 'Multi-state health degradation model. Machine health transitions through states (0 = healthy to h_max = failed). Enables Condition-Based Maintenance (CBM) when health exceeds threshold.',
            hmax: 'Number of the failed health state. Total states = h_max + 1 (e.g. h_max=4 means states 0,1,2,3,4 where 4=failed). More states = more gradual degradation.',
            pdegrade: 'Per-simulation-step probability of moving to the next degradation state. Lower = slower degradation. Typical range: 0.001 to 0.05.',
            cbm: 'Condition-Based Maintenance threshold. When health state reaches this level, a repair is triggered before total failure. Set to 0 to disable CBM (only repair on failure).',
        };

        function tip(key) {
            return `<span class="help-icon" data-bs-toggle="tooltip" data-bs-placement="top" title="${TIPS[key]}">?</span>`;
        }

        // --- Load scenario list ---
        async function loadScenarioList() {
            const resp = await fetch('/api/scenarios');
            scenarioMeta = await resp.json();
            const select = document.getElementById('scenario-select');
            select.innerHTML = '<option value="">-- Select --</option>';
            for (const [name, info] of Object.entries(scenarioMeta)) {
                const opt = document.createElement('option');
                opt.value = name;
                const desc = info.description ? ` - ${info.description}` : '';
                opt.textContent = `${name}${desc}`;
                select.appendChild(opt);
            }
        }

        // --- Load a scenario into the form ---
        async function loadScenario(name) {
            if (!name) {
                document.getElementById('scenario-description').textContent = '';
                return;
            }
            isNewScenario = false;
            currentScenario = name;
            document.getElementById('name-group').style.display = 'none';

            const meta = scenarioMeta[name];
            document.getElementById('scenario-description').textContent =
                meta && meta.description ? meta.description : '';

            const resp = await fetch(`/api/scenario/${name}`);
            scenarioData = await resp.json();
            populateForm(scenarioData);
            loadYamlPreview(name);
        }

        function newScenario() {
            isNewScenario = true;
            currentScenario = null;
            document.getElementById('name-group').style.display = '';
            document.getElementById('scenario-name').value = '';
            document.getElementById('scenario-select').value = '';
            document.getElementById('scenario-description').textContent = '';

            scenarioData = {
                machines: [
                    {name: 'M1', cycle_time: 1.0, failure_rate: 0.0, repair_time: 10.0},
                    {name: 'M2', cycle_time: 1.0, failure_rate: 0.0, repair_time: 10.0}
                ],
                buffers: [
                    {name: 'B1', capacity: 10, upstream: 'M1', downstream: 'M2'}
                ]
            };
            populateForm(scenarioData);
            document.getElementById('yaml-preview').textContent = 'Click "Preview YAML" to see the config.';
        }

        // --- Populate form from config data ---
        function populateForm(cfg) {
            const mc = document.getElementById('machines-container');
            mc.innerHTML = '';
            (cfg.machines || []).forEach((m, i) => {
                mc.innerHTML += buildMachineForm(m, i);
            });

            rebuildBuffers();

            document.getElementById('warm-up-time').value = cfg.warm_up_time || 0;
            document.getElementById('feat-maintainer').checked =
                cfg.maintainer && cfg.maintainer.enabled;
            document.getElementById('feat-shifts').checked = !!cfg.shifts;
            document.getElementById('feat-historian').checked = !!cfg.historian;

            document.querySelectorAll('.machine-section').forEach(section => {
                syncPpmToCycle(section);
            });
            initTooltips();
        }

        function buildMachineForm(m, idx) {
            const hasPpm = m.target_ppm ? true : false;
            const cycleVal = hasPpm ? (60.0 / m.target_ppm).toFixed(2) : (m.cycle_time || 1);
            const cycleDisabled = hasPpm ? 'disabled' : '';
            const defectRate = (m.quality_routing && m.quality_routing.defect_rate != null)
                ? m.quality_routing.defect_rate : (m.defect_rate || 0);

            const hasDeg = m.enable_degradation;
            const degDisplay = hasDeg ? '' : 'display:none;';

            return `
            <div class="machine-section" id="machine-${idx}">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong>Machine ${idx + 1}</strong>
                    <span class="remove-btn" onclick="removeMachine(${idx})" title="Remove this machine">&times;</span>
                </div>

                <!-- Row 1: Core parameters -->
                <div class="row g-2">
                    <div class="col-md-2">
                        <label class="form-label small">Name ${tip('name')}</label>
                        <input type="text" class="form-control form-control-sm m-name" value="${m.name || ''}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Cycle Time (s) ${tip('cycle')}</label>
                        <input type="number" class="form-control form-control-sm m-cycle" value="${cycleVal}" step="0.1" min="0.1" ${cycleDisabled}
                               oninput="syncCycleToPpm(this.closest('.machine-section'))">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Target PPM ${tip('ppm')}</label>
                        <input type="number" class="form-control form-control-sm m-ppm" value="${m.target_ppm || ''}" step="1" min="0" placeholder="optional"
                               oninput="syncPpmToCycle(this.closest('.machine-section'))">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small">Defect Rate ${tip('defect')}</label>
                        <input type="number" class="form-control form-control-sm m-defect" value="${defectRate}" step="0.01" min="0" max="1">
                    </div>
                </div>
                <div class="ppm-formula" id="ppm-formula-${idx}"></div>

                <!-- Row 2: Feature toggles -->
                <div class="feature-row">
                    <div class="feature-item">
                        <input class="form-check-input m-spc" type="checkbox" ${m.enable_spc ? 'checked' : ''}>
                        <label class="form-check-label small">SPC ${tip('spc')}</label>
                    </div>
                    <div class="feature-item">
                        <input class="form-check-input m-failures" type="checkbox" ${m.enable_advanced_failures ? 'checked' : ''}>
                        <label class="form-check-label small">Adv. Failures ${tip('failures')}</label>
                    </div>
                    <div class="feature-item">
                        <input class="form-check-input m-qr" type="checkbox" ${m.quality_routing && m.quality_routing.enabled ? 'checked' : ''}>
                        <label class="form-check-label small">Quality Routing ${tip('qr')}</label>
                    </div>
                    <div class="feature-item">
                        <input class="form-check-input m-degradation" type="checkbox" ${hasDeg ? 'checked' : ''}
                               onchange="toggleDegradation(this.closest('.machine-section'))">
                        <label class="form-check-label small">Degradation ${tip('degradation')}</label>
                    </div>
                </div>

                <!-- Degradation fields (inline, compact) -->
                <div class="degradation-fields" style="${degDisplay}">
                    <div class="degradation-inline">
                        <label>Failed State ${tip('hmax')}</label>
                        <input type="number" class="form-control form-control-sm m-hmax" value="${(m.health_states && m.health_states.h_max) || 1}" min="1" step="1">
                        <label>Degrade Prob ${tip('pdegrade')}</label>
                        <input type="number" class="form-control form-control-sm m-pdegrade" value="${(m.health_states && m.health_states.p_degrade) || 0.01}" min="0" max="1" step="0.001">
                        <label>CBM Threshold ${tip('cbm')}</label>
                        <input type="number" class="form-control form-control-sm m-cbm" value="${(m.health_states && m.health_states.cbm_threshold) || 0}" min="0" step="1">
                    </div>
                </div>

                <!-- Feature summary badges + collapsible details -->
                ${buildFeatureSummary(m, idx)}
            </div>`;
        }

        function buildFeatureSummary(m, idx) {
            const badges = [];
            const details = [];

            // SPC
            if (m.enable_spc && m.spc) {
                const s = m.spc;
                badges.push(`<span class="feature-badge active">SPC</span>`);
                let d = `<dt>SPC Configuration</dt><dd>`;
                d += `Characteristic: ${s.characteristic || 'cycle_time'}`;
                if (s.usl != null) d += ` | Limits: [${s.lsl}, ${s.usl}]`;
                if (s.target != null) d += ` | Target: ${s.target}`;
                d += `<br>Subgroups: ${s.subgroup_size || 5} samples x ${s.num_subgroups || 25} groups`;
                d += ` | Western Electric: ${s.enable_western_electric !== false ? 'enabled' : 'disabled'}`;
                if (s.measurement_noise) d += ` | Noise: ${(s.measurement_noise * 100).toFixed(0)}%`;
                d += `</dd>`;
                details.push(d);
            } else if (m.enable_spc) {
                badges.push(`<span class="feature-badge active">SPC</span>`);
            }

            // Failure modes
            if (m.enable_advanced_failures && m.failure_modes && m.failure_modes.length > 0) {
                badges.push(`<span class="feature-badge active-orange">${m.failure_modes.length} Failure Mode${m.failure_modes.length > 1 ? 's' : ''}</span>`);
                let d = `<dt>Failure Modes</dt>`;
                for (const fm of m.failure_modes) {
                    d += `<dd><strong>${fm.name}</strong> (${fm.type}): MTTF ${formatDist(fm.mttf)} | MTTR ${formatDist(fm.mttr)}</dd>`;
                }
                if (m.maintenance_strategy) {
                    const ms = m.maintenance_strategy;
                    d += `<dd>Strategy: <strong>${ms.type}</strong>`;
                    if (ms.pm_interval) d += ` | PM interval: ${ms.pm_interval}`;
                    if (ms.cbm_threshold) d += ` | CBM threshold: ${ms.cbm_threshold}`;
                    d += `</dd>`;
                }
                details.push(d);
            } else if (m.enable_advanced_failures) {
                badges.push(`<span class="feature-badge active-orange">Adv. Failures</span>`);
            }

            // Degradation
            if (m.enable_degradation && m.health_states && m.health_states.h_max > 1) {
                const hs = m.health_states;
                badges.push(`<span class="feature-badge active-purple">${hs.h_max + 1}-State Health</span>`);
            } else if (m.enable_degradation) {
                badges.push(`<span class="feature-badge active-purple">Degradation</span>`);
            }

            // Quality routing
            if (m.quality_routing && m.quality_routing.enabled) {
                const qr = m.quality_routing;
                const modeLabel = qr.mode === 'scrap_and_rework' ? 'Scrap + Rework' : (qr.mode || 'Scrap');
                badges.push(`<span class="feature-badge active-green">${modeLabel}</span>`);
                if (qr.defect_rate || qr.rework_success_rate) {
                    let d = `<dt>Quality Routing</dt><dd>`;
                    d += `Mode: ${qr.mode || 'scrap'}`;
                    if (qr.defect_rate) d += ` | Defect rate: ${(qr.defect_rate * 100).toFixed(1)}%`;
                    if (qr.enable_health_correlation) d += ` | Health correlation: x${qr.health_multiplier || 3}`;
                    if (qr.rework_success_rate) d += `<br>Rework: ${(qr.rework_success_rate * 100).toFixed(0)}% success rate, max ${qr.max_rework || 3} attempts`;
                    if (qr.scrap_sink) d += ` | Sink: ${qr.scrap_sink}`;
                    d += `</dd>`;
                    details.push(d);
                }
            }

            let html = '';
            if (badges.length > 0) {
                html += `<div class="feature-badges">${badges.join('')}`;
                if (details.length > 0) {
                    html += ` <button class="detail-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#details-${idx}">Show details &darr;</button>`;
                }
                html += `</div>`;
            }
            if (details.length > 0) {
                html += `<div class="collapse" id="details-${idx}"><div class="detail-panel"><dl class="mb-0">${details.join('')}</dl></div></div>`;
            }
            return html;
        }

        function formatDist(dist) {
            if (!dist) return '?';
            const d = dist.distribution;
            switch (d) {
                case 'weibull': return `weibull(shape=${dist.shape}, scale=${dist.scale})`;
                case 'exponential': return `exponential(mean=${dist.mean})`;
                case 'lognormal': return `lognormal(mean=${dist.mean}, std=${dist.std})`;
                case 'normal': return `normal(mean=${dist.mean}, std=${dist.std})`;
                case 'uniform': return `uniform(${dist.min}-${dist.max})`;
                case 'constant': return `constant(${dist.value})`;
                default: return d || '?';
            }
        }

        function toggleDegradation(section) {
            const checked = section.querySelector('.m-degradation').checked;
            const fields = section.querySelector('.degradation-fields');
            fields.style.display = checked ? '' : 'none';
        }

        function addMachine() {
            const mc = document.getElementById('machines-container');
            const count = mc.querySelectorAll('.machine-section').length;
            const name = `M${count + 1}`;
            const m = {name: name, cycle_time: 1.0, defect_rate: 0};
            mc.insertAdjacentHTML('beforeend', buildMachineForm(m, count));
            rebuildBuffers();
            initTooltips();
        }

        function removeMachine(idx) {
            const sections = document.querySelectorAll('.machine-section');
            if (sections.length <= 2) {
                showAlert('Minimum 2 machines required', 'warning');
                return;
            }
            sections[idx].remove();
            document.querySelectorAll('.machine-section').forEach((s, i) => {
                s.id = `machine-${i}`;
                s.querySelector('strong').textContent = `Machine ${i + 1}`;
            });
            rebuildBuffers();
        }

        function rebuildBuffers() {
            const names = Array.from(document.querySelectorAll('.m-name')).map(el => el.value);
            const bc = document.getElementById('buffers-container');
            if (names.length < 2) {
                bc.innerHTML = '<p class="text-muted small">Need at least 2 machines for buffers</p>';
                return;
            }
            let html = '';
            for (let i = 0; i < names.length - 1; i++) {
                html += `
                <div class="buffer-section">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-3">
                            <label class="form-label small">Name</label>
                            <input type="text" class="form-control form-control-sm b-name" value="B${i + 1}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small">Capacity</label>
                            <input type="number" class="form-control form-control-sm b-cap" value="10" min="1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small">Routing</label>
                            <div class="form-control-plaintext small">${names[i]} &rarr; ${names[i + 1]}</div>
                        </div>
                    </div>
                </div>`;
            }
            bc.innerHTML = html;
        }

        // --- Collect form data into config object ---
        function collectFormData() {
            const machineEls = document.querySelectorAll('.machine-section');
            const machines = [];
            machineEls.forEach(el => {
                const formDefect = parseFloat(el.querySelector('.m-defect').value) || 0;
                const m = {
                    name: el.querySelector('.m-name').value,
                    cycle_time: parseFloat(el.querySelector('.m-cycle').value) || 1.0,
                };
                const ppm = el.querySelector('.m-ppm').value;
                if (ppm) {
                    m.target_ppm = parseInt(ppm);
                    delete m.cycle_time;
                }
                const orig = (scenarioData && scenarioData.machines || [])[machines.length] || {};
                if (el.querySelector('.m-spc').checked) {
                    m.enable_spc = true;
                    if (orig.spc) m.spc = orig.spc;
                }
                if (el.querySelector('.m-failures').checked) {
                    m.enable_advanced_failures = true;
                    if (orig.failure_modes) m.failure_modes = orig.failure_modes;
                    if (orig.maintenance_strategy) m.maintenance_strategy = orig.maintenance_strategy;
                }
                if (el.querySelector('.m-qr').checked) {
                    const qr = Object.assign({}, orig.quality_routing || {enabled: true});
                    qr.enabled = true;
                    qr.defect_rate = formDefect;
                    m.quality_routing = qr;
                } else if (formDefect > 0) {
                    m.defect_rate = formDefect;
                }
                if (el.querySelector('.m-degradation').checked) {
                    m.enable_degradation = true;
                    const hmax = parseInt(el.querySelector('.m-hmax').value) || 1;
                    const pdegrade = parseFloat(el.querySelector('.m-pdegrade').value) || 0.01;
                    const cbm = parseInt(el.querySelector('.m-cbm').value) || 0;
                    if (hmax > 1) {
                        m.health_states = {h_max: hmax, p_degrade: pdegrade, cbm_threshold: cbm};
                    }
                }
                machines.push(m);
            });

            const bufferEls = document.querySelectorAll('.buffer-section');
            const buffers = [];
            bufferEls.forEach((el, i) => {
                buffers.push({
                    name: el.querySelector('.b-name').value,
                    capacity: parseInt(el.querySelector('.b-cap').value) || 10,
                    upstream: machines[i].name,
                    downstream: machines[i + 1].name,
                });
            });

            const cfg = {machines, buffers};
            const warmUp = parseInt(document.getElementById('warm-up-time').value) || 0;
            if (warmUp > 0) cfg.warm_up_time = warmUp;
            if (document.getElementById('feat-maintainer').checked) {
                cfg.maintainer = (scenarioData && scenarioData.maintainer) || {enabled: true};
            }
            if (document.getElementById('feat-shifts').checked && scenarioData && scenarioData.shifts) {
                cfg.shifts = scenarioData.shifts;
            }
            if (document.getElementById('feat-historian').checked && scenarioData && scenarioData.historian) {
                cfg.historian = scenarioData.historian;
            }
            if (scenarioData && scenarioData.scrap_sinks) {
                cfg.scrap_sinks = scenarioData.scrap_sinks;
            }
            if (scenarioData && scenarioData.description) {
                cfg.description = scenarioData.description;
            }
            return cfg;
        }

        // --- Save ---
        async function saveScenario() {
            const cfg = collectFormData();
            let url, method;

            if (isNewScenario) {
                const name = document.getElementById('scenario-name').value.trim();
                if (!name) {
                    showAlert('Please enter a scenario name', 'warning');
                    return;
                }
                cfg._name = name;
                url = '/api/scenario';
                method = 'POST';
            } else {
                url = `/api/scenario/${currentScenario}`;
                method = 'PUT';
            }

            const resp = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(cfg)
            });
            const result = await resp.json();
            if (resp.ok) {
                showAlert(`Scenario saved: ${result.scenario}`, 'success');
                await loadScenarioList();
                const savedName = result.scenario;
                if (isNewScenario) {
                    isNewScenario = false;
                    document.getElementById('name-group').style.display = 'none';
                }
                document.getElementById('scenario-select').value = savedName;
                currentScenario = savedName;
                await loadScenario(savedName);
            } else {
                showAlert(result.error, 'danger');
            }
        }

        // --- YAML Preview ---
        async function previewYaml() {
            const cfg = collectFormData();
            const name = isNewScenario
                ? (document.getElementById('scenario-name').value.trim() || 'new_scenario')
                : currentScenario;
            let lines = [`${name}:`];
            lines.push('  machines:');
            for (const m of cfg.machines) {
                lines.push(`    - name: ${m.name}`);
                if (m.target_ppm) lines.push(`      target_ppm: ${m.target_ppm}`);
                else lines.push(`      cycle_time: ${m.cycle_time}`);
                if (m.defect_rate) lines.push(`      defect_rate: ${m.defect_rate}`);
                if (m.enable_spc) lines.push(`      enable_spc: true`);
                if (m.enable_advanced_failures) lines.push(`      enable_advanced_failures: true`);
                if (m.enable_degradation) {
                    lines.push(`      enable_degradation: true`);
                    if (m.health_states) {
                        lines.push(`      health_states:`);
                        lines.push(`        h_max: ${m.health_states.h_max}`);
                        lines.push(`        p_degrade: ${m.health_states.p_degrade}`);
                        lines.push(`        cbm_threshold: ${m.health_states.cbm_threshold}`);
                    }
                }
                if (m.quality_routing) lines.push(`      quality_routing:\n        enabled: true`);
            }
            lines.push('  buffers:');
            for (const b of cfg.buffers) {
                lines.push(`    - name: ${b.name}`);
                lines.push(`      capacity: ${b.capacity}`);
                lines.push(`      upstream: ${b.upstream}`);
                lines.push(`      downstream: ${b.downstream}`);
            }
            if (cfg.warm_up_time) lines.push(`  warm_up_time: ${cfg.warm_up_time}`);
            if (cfg.maintainer) lines.push('  maintainer:\n    enabled: true');
            document.getElementById('yaml-preview').textContent = lines.join('\n');
        }

        async function loadYamlPreview(name) {
            const resp = await fetch(`/api/scenario/${name}/yaml`);
            const data = await resp.json();
            document.getElementById('yaml-preview').textContent = data.yaml || 'Error loading YAML';
        }

        function showAlert(msg, type) {
            const area = document.getElementById('alert-area');
            area.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show py-2" role="alert">
                ${msg}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
            setTimeout(() => { area.innerHTML = ''; }, 5000);
        }

        // --- PPM / Cycle Time bidirectional sync ---
        function syncPpmToCycle(section) {
            const ppmInput = section.querySelector('.m-ppm');
            const cycleInput = section.querySelector('.m-cycle');
            const formula = section.querySelector('.ppm-formula');
            const ppmVal = parseFloat(ppmInput.value);
            if (ppmVal > 0) {
                const derived = (60.0 / ppmVal).toFixed(2);
                cycleInput.value = derived;
                cycleInput.disabled = true;
                if (formula) formula.textContent = `= 60 / ${ppmVal} PPM = ${derived}s cycle time`;
            } else {
                cycleInput.disabled = false;
                if (formula) {
                    const ct = parseFloat(cycleInput.value) || 1;
                    const derivedPpm = (60.0 / ct).toFixed(1);
                    formula.textContent = ct > 0 ? `cycle ${ct}s = ${derivedPpm} PPM` : '';
                }
            }
        }

        function syncCycleToPpm(section) {
            const ppmInput = section.querySelector('.m-ppm');
            const cycleInput = section.querySelector('.m-cycle');
            const formula = section.querySelector('.ppm-formula');
            if (!ppmInput.value) {
                const ct = parseFloat(cycleInput.value) || 1;
                const derivedPpm = (60.0 / ct).toFixed(1);
                if (formula) formula.textContent = ct > 0 ? `cycle ${ct}s = ${derivedPpm} PPM` : '';
            }
        }

        // --- Bootstrap tooltips ---
        function initTooltips() {
            document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
                if (!bootstrap.Tooltip.getInstance(el)) {
                    new bootstrap.Tooltip(el, {delay: {show: 200, hide: 0}});
                }
            });
        }

        // --- Init ---
        loadScenarioList();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
