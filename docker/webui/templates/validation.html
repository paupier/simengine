<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simantha - Pipeline Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1520; color: #dde4f0; }
        .badge-pass { background: #198754; }
        .badge-fail { background: #dc3545; }
        .badge-warn { background: #fd7e14; }
        .badge-skip { background: #6c757d; }
        .verdict-pass { background: #198754; color: white; font-size: 1.4rem; padding: 16px; border-radius: 8px; text-align: center; }
        .verdict-fail { background: #dc3545; color: white; font-size: 1.4rem; padding: 16px; border-radius: 8px; text-align: center; }
        .status-connected { color: #198754; font-weight: bold; }
        .status-disconnected { color: #dc3545; font-weight: bold; }
        .section-card { margin-bottom: 16px; }
        .stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }
        .stat-label { color: #6c757d; }
        .stat-value { font-weight: 600; }
        #loading-spinner { display: none; }
        /* ── HMI Page Header ── */
        .hmi-page-header {
            height: 52px; background: #080d18;
            border-bottom: 1px solid #1a2840;
            display: flex; align-items: center;
            padding: 0 16px; gap: 0;
        }
        .hmi-logo {
            width: 34px; height: 34px; background: #e63946; color: #fff;
            font-weight: 900; font-size: 17px; border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 12px; flex-shrink: 0;
        }
        .hmi-title {
            font-size: 14px; font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase; color: #dde4f0; flex-shrink: 0;
        }
        .hmi-subtitle {
            color: #7a8ba8; margin-left: 10px; font-size: 12px;
            letter-spacing: 0.04em; flex-shrink: 0;
        }
        .hmi-vdiv {
            width: 1px; height: 28px; background: #1a2840;
            margin: 0 16px; flex-shrink: 0;
        }
        .hmi-nav { display: flex; gap: 2px; }
        .hmi-nav a {
            color: #7a8ba8; text-decoration: none;
            font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
            padding: 6px 14px; border-radius: 3px;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, background 0.15s;
        }
        .hmi-nav a:hover { color: #dde4f0; background: #0e1828; }
        .hmi-nav a.active { color: #00c8e6; border-bottom-color: #00c8e6; }
        /* ── Bootstrap dark overrides ── */
        .card { background: #0e1828 !important; border-color: #1a2840 !important; }
        .card-header { background: #080d18 !important; border-color: #1a2840 !important; color: #dde4f0 !important; }
        .card-body, .card-footer { color: #dde4f0; }
        .table { color: #c8d6e8; --bs-table-bg: transparent; --bs-table-border-color: #1a2840; }
        .table thead th { background: #080d18; color: #8aaac8; border-color: #1a2840; }
        .table-hover > tbody > tr:hover > * { background-color: rgba(0,200,230,0.04) !important; color: #dde4f0; }
        .table-striped > tbody > tr:nth-of-type(odd) > * { background-color: rgba(255,255,255,0.02); }
        .form-control, .form-select {
            background: #0e1828; border-color: #1e3555; color: #dde4f0;
        }
        .form-control:focus, .form-select:focus {
            background: #101d30; border-color: #00c8e6; color: #dde4f0;
            box-shadow: 0 0 0 2px rgba(0,200,230,0.12);
        }
        .form-control::placeholder { color: #6a84a0; }
        .form-control:disabled, .form-control[readonly] { background: #080d18; color: #7a8ba8; }
        select option { background: #0e1828; }
        .form-label, label { color: #a8bdd4; }
        .form-text, .text-muted { color: #7a8ba8 !important; }
        .form-check-input { background-color: #0e1828; border-color: #1e3555; }
        .input-group-text { background: #080d18; border-color: #1e3555; color: #8aaac8; }
        .btn-outline-primary { border-color: #00c8e6; color: #00c8e6; }
        .btn-outline-primary:hover { background: rgba(0,200,230,0.12); color: #00c8e6; border-color: #00c8e6; }
        .btn-outline-secondary { border-color: #3d5a7a; color: #96a8be; }
        .btn-outline-secondary:hover { background: rgba(150,168,190,0.12); color: #c8d6e8; }
        .btn-outline-info { border-color: #00c8e6; color: #00c8e6; }
        .btn-outline-info:hover { background: rgba(0,200,230,0.12); color: #00c8e6; }
        .btn-outline-danger { border-color: #e63946; color: #e63946; }
        .btn-outline-danger:hover { background: rgba(230,57,70,0.12); color: #e63946; }
        .btn-outline-warning { border-color: #f4a261; color: #f4a261; }
        .btn-outline-warning:hover { background: rgba(244,162,97,0.12); color: #f4a261; }
        .btn-outline-success { border-color: #2ecc71; color: #2ecc71; }
        .btn-outline-success:hover { background: rgba(46,204,113,0.12); color: #2ecc71; }
        .btn-outline-light { border-color: #3d5a7a; color: #96a8be; }
        .btn-outline-light:hover { background: rgba(150,168,190,0.1); color: #c8d6e8; }
        .btn-primary { background: #00c8e6; border-color: #00c8e6; color: #000; }
        .btn-success { background: #2ecc71; border-color: #2ecc71; color: #000; }
        .btn-danger  { background: #e63946; border-color: #e63946; }
        .btn-warning { background: #f4a261; border-color: #f4a261; color: #000; }
        .btn-light   { background: #1e3555; border-color: #1e3555; color: #dde4f0; }
        .btn-info    { background: #00c8e6; border-color: #00c8e6; color: #000; }
        .badge.bg-secondary { background: #1e3555 !important; }
        .badge.bg-light { background: #1e3555 !important; color: #a8bdd4 !important; }
        .alert-info    { background: rgba(0,200,230,0.08);   border-color: rgba(0,200,230,0.2);   color: #96d8e8; }
        .alert-warning { background: rgba(244,162,97,0.08);  border-color: rgba(244,162,97,0.2);  color: #f4a261; }
        .alert-danger  { background: rgba(230,57,70,0.1);    border-color: rgba(230,57,70,0.25);  color: #e63946; }
        .alert-success { background: rgba(46,204,113,0.08);  border-color: rgba(46,204,113,0.2);  color: #2ecc71; }
        .modal-content { background: #0e1828; border-color: #1a2840; color: #dde4f0; }
        .modal-header, .modal-footer { border-color: #1a2840; }
        .dropdown-menu { background: #0e1828; border-color: #1a2840; }
        .dropdown-item { color: #a8bdd4; }
        .dropdown-item:hover { background: #1a2840; color: #dde4f0; }
        hr { border-color: #1a2840; }
        code { color: #00c8e6; background: rgba(0,200,230,0.08); padding: 1px 4px; border-radius: 3px; }
        pre { background: #060b14; color: #a8bdd4; border: 1px solid #1a2840; border-radius: 4px; padding: 12px; }
        h1,h2,h3,h4,h5,h6,strong { color: #dde4f0; }
        a:not(.btn):not(.hmi-nav a) { color: #00c8e6; }
        a:not(.btn):not(.hmi-nav a):hover { color: #33d4ee; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0d1520; }
        ::-webkit-scrollbar-thumb { background: #1e3555; border-radius: 2px; }
    </style>
</head>
<body>
    <header class="hmi-page-header">
        <div class="hmi-logo">S</div>
        <span class="hmi-title">Simantha Digital Twin</span>
        <span class="hmi-subtitle">| Plant Overview</span>
        <div class="hmi-vdiv"></div>
        <nav class="hmi-nav">
            <a href="/">Dashboard</a>
            <a href="/runs">Run Reports</a>
            <a href="/config">Config</a>
            <a href="/recipes">Recipes</a>
        </nav>
    </header>

    <div class="container-fluid mt-3">
        <!-- InfluxDB Connection Status -->
        <div class="card section-card">
            <div class="card-header d-flex justify-content-between">
                <strong>InfluxDB Connection</strong>
                <span id="influx-status" class="status-disconnected">Checking...</span>
            </div>
            <div class="card-body">
                <div class="stat-row"><span class="stat-label">URL</span><span class="stat-value" id="influx-url">-</span></div>
                <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value" id="influx-message">-</span></div>
            </div>
        </div>

        <!-- File selector + Run button -->
        <div class="card section-card">
            <div class="card-body d-flex align-items-center gap-3">
                <strong>CSV File:</strong>
                <select id="file-select" class="form-select form-select-sm" style="width:auto;min-width:300px;">
                    <option value="">-- Select CSV file --</option>
                </select>
                <button class="btn btn-warning btn-sm" onclick="runValidation()" id="btn-validate">Run Validation</button>
                <div id="loading-spinner" class="spinner-border spinner-border-sm text-warning" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <span id="validate-status" class="text-muted small"></span>
            </div>
        </div>

        <!-- Results (hidden until validation runs) -->
        <div id="validation-results" style="display:none;">
            <!-- Telegraf Summary -->
            <div class="card section-card">
                <div class="card-header"><strong>Telegraf Data Summary</strong></div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="stat-row"><span class="stat-label">Total Points</span><span class="stat-value" id="tel-points">-</span></div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-row"><span class="stat-label">First SimTime</span><span class="stat-value" id="tel-first">-</span></div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-row"><span class="stat-label">Last SimTime</span><span class="stat-value" id="tel-last">-</span></div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-row"><span class="stat-label">Gaps > 5s</span><span class="stat-value" id="tel-gaps">-</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Validation Checks Table -->
            <div class="card section-card">
                <div class="card-header"><strong>Validation Checks</strong></div>
                <div class="card-body">
                    <table class="table table-sm table-hover" id="checks-table">
                        <thead>
                            <tr>
                                <th>Check</th>
                                <th>CSV Value</th>
                                <th>Telegraf Value</th>
                                <th>Result</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Verdict Banner -->
            <div id="verdict-banner" class="section-card"></div>
        </div>
    </div>

    <script>
        // --- Check InfluxDB connectivity ---
        async function checkInfluxDB() {
            try {
                const resp = await fetch('/api/validation/influxdb/status');
                const data = await resp.json();
                const statusEl = document.getElementById('influx-status');
                document.getElementById('influx-url').textContent = data.url || '-';

                if (data.connected) {
                    statusEl.textContent = 'Connected';
                    statusEl.className = 'status-connected';
                    document.getElementById('influx-message').textContent = data.message || 'OK';
                } else {
                    statusEl.textContent = 'Disconnected';
                    statusEl.className = 'status-disconnected';
                    document.getElementById('influx-message').textContent = data.error || 'Cannot connect';
                }
            } catch (e) {
                document.getElementById('influx-status').textContent = 'Error';
                document.getElementById('influx-status').className = 'status-disconnected';
            }
        }

        // --- Load file list ---
        async function loadFiles() {
            const resp = await fetch('/api/reports/files');
            const data = await resp.json();
            const select = document.getElementById('file-select');
            select.innerHTML = '<option value="">-- Select CSV file --</option>';
            for (const f of data.files) {
                const opt = document.createElement('option');
                opt.value = f.name;
                opt.textContent = `${f.scenario} (${f.size_mb} MB) - ${f.modified.split('T')[0]}`;
                select.appendChild(opt);
            }
        }

        // --- Run validation ---
        async function runValidation() {
            const filename = document.getElementById('file-select').value;
            if (!filename) { alert('Select a CSV file first'); return; }

            document.getElementById('loading-spinner').style.display = '';
            document.getElementById('btn-validate').disabled = true;
            document.getElementById('validate-status').textContent = 'Running validation...';

            try {
                const resp = await fetch('/api/validation/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({filename})
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    alert('Validation failed: ' + (err.error || 'Unknown error'));
                    return;
                }
                const result = await resp.json();
                renderValidation(result);
                document.getElementById('validation-results').style.display = '';
                document.getElementById('validate-status').textContent = 'Done';
            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('btn-validate').disabled = false;
            }
        }

        // --- Render validation results ---
        function renderValidation(v) {
            // Telegraf summary
            document.getElementById('tel-points').textContent = (v.telegraf_total_points || 0).toLocaleString();
            document.getElementById('tel-first').textContent = v.telegraf_first_simtime != null ? v.telegraf_first_simtime : '-';
            document.getElementById('tel-last').textContent = v.telegraf_last_simtime != null ? v.telegraf_last_simtime : '-';
            document.getElementById('tel-gaps').textContent = v.telegraf_gaps_over_5s;

            // Checks table
            const tbody = document.querySelector('#checks-table tbody');
            tbody.innerHTML = '';
            for (const check of v.checks) {
                let badgeClass;
                switch (check.status) {
                    case 'PASS': badgeClass = 'badge-pass'; break;
                    case 'FAIL': badgeClass = 'badge-fail'; break;
                    case 'SKIP': badgeClass = 'badge-skip'; break;
                    default: badgeClass = 'badge-warn';
                }
                tbody.innerHTML += `<tr>
                    <td>${check.name}</td>
                    <td><code>${check.csv_value}</code></td>
                    <td><code>${check.telegraf_value}</code></td>
                    <td><span class="badge ${badgeClass}">${check.status}</span></td>
                </tr>`;
            }

            // Verdict banner
            const banner = document.getElementById('verdict-banner');
            if (v.verdict === 'PASS') {
                banner.innerHTML = `<div class="verdict-pass">ALL CHECKS PASSED (${v.passed}/${v.total})</div>`;
            } else {
                banner.innerHTML = `<div class="verdict-fail">SOME CHECKS FAILED (${v.passed}/${v.total})</div>`;
            }
        }

        // --- Init ---
        checkInfluxDB();
        loadFiles();
    </script>
</body>
</html>
