# Telegraf OPC UA -> InfluxDB pipeline for Simantha Digital Twin
#
# Polls the OPC UA server's explicit string NodeIds and writes
# received values to InfluxDB.  Used to validate the OPC UA wire protocol
# pipeline against the CSV historian (ground truth).
#
# Designed for the full_feature_line scenario (2 machines, 1 buffer).

[agent]
  interval = "1s"
  flush_interval = "5s"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "simantha-dev-token"
  organization = "simantha"
  bucket = "manufacturing"

[[inputs.opcua]]
  name = "opcua"
  endpoint = "opc.tcp://simantha:4840/simantha/"
  security_policy = "None"
  security_mode = "None"
  connect_timeout = "30s"
  request_timeout = "10s"

  nodes = [
    {name="SimTime",           namespace="2", identifier_type="s", identifier="Line1.System.SimTime"},
    {name="Throughput",        namespace="2", identifier_type="s", identifier="Line1.System.Throughput"},
    {name="TotalWIP",          namespace="2", identifier_type="s", identifier="Line1.LineKPIs.TotalWIP"},
    {name="LineOEE",           namespace="2", identifier_type="s", identifier="Line1.LineKPIs.LineOEE.OEE"},
    {name="LineAvailability",  namespace="2", identifier_type="s", identifier="Line1.LineKPIs.LineOEE.Availability"},
    {name="LinePerformance",   namespace="2", identifier_type="s", identifier="Line1.LineKPIs.LineOEE.Performance"},
    {name="LineQuality",       namespace="2", identifier_type="s", identifier="Line1.LineKPIs.LineOEE.Quality"},
    {name="TotalScrap",        namespace="2", identifier_type="s", identifier="Line1.LineKPIs.TotalScrap"},
    {name="ScrapRate",         namespace="2", identifier_type="s", identifier="Line1.LineKPIs.ScrapRate"},
    {name="M1_State",          namespace="2", identifier_type="s", identifier="Line1.Machine1.State",              tags={source="Machine1"}},
    {name="M1_PartCount",      namespace="2", identifier_type="s", identifier="Line1.Machine1.PartCount",          tags={source="Machine1"}},
    {name="M1_Utilisation",    namespace="2", identifier_type="s", identifier="Line1.Machine1.Utilisation",        tags={source="Machine1"}},
    {name="M1_TargetPPM",      namespace="2", identifier_type="s", identifier="Line1.Machine1.TargetPPM",          tags={source="Machine1"}},
    {name="M1_ActualPPM",      namespace="2", identifier_type="s", identifier="Line1.Machine1.ActualPPM",          tags={source="Machine1"}},
    {name="M1_OEE",            namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.OEE",            tags={source="Machine1"}},
    {name="M1_Availability",   namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.Availability",   tags={source="Machine1"}},
    {name="M1_Performance",    namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.Performance",    tags={source="Machine1"}},
    {name="M1_Quality",        namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.Quality",        tags={source="Machine1"}},
    {name="M1_GoodParts",      namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.GoodPartCount",  tags={source="Machine1"}},
    {name="M1_DefectParts",    namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.DefectivePartCount", tags={source="Machine1"}},
    {name="M2_State",          namespace="2", identifier_type="s", identifier="Line1.Machine2.State",              tags={source="Machine2"}},
    {name="M2_PartCount",      namespace="2", identifier_type="s", identifier="Line1.Machine2.PartCount",          tags={source="Machine2"}},
    {name="M2_Utilisation",    namespace="2", identifier_type="s", identifier="Line1.Machine2.Utilisation",        tags={source="Machine2"}},
    {name="M2_TargetPPM",      namespace="2", identifier_type="s", identifier="Line1.Machine2.TargetPPM",          tags={source="Machine2"}},
    {name="M2_ActualPPM",      namespace="2", identifier_type="s", identifier="Line1.Machine2.ActualPPM",          tags={source="Machine2"}},
    {name="M2_OEE",            namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.OEE",            tags={source="Machine2"}},
    {name="M2_Availability",   namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.Availability",   tags={source="Machine2"}},
    {name="M2_Performance",    namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.Performance",    tags={source="Machine2"}},
    {name="M2_Quality",        namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.Quality",        tags={source="Machine2"}},
    {name="M2_GoodParts",      namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.GoodPartCount",  tags={source="Machine2"}},
    {name="M2_DefectParts",    namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.DefectivePartCount", tags={source="Machine2"}},
    {name="B1_Level",          namespace="2", identifier_type="s", identifier="Line1.Buffer1.CurrentLevel",         tags={source="Buffer1"}},
    {name="B1_Capacity",       namespace="2", identifier_type="s", identifier="Line1.Buffer1.Capacity",             tags={source="Buffer1"}},
  ]
