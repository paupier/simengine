    {name="M2_PMCount",          namespace="2", identifier_type="s", identifier="Line1.Machine2.MaintenanceStrategy.PMCount",          tags={source="Machine2", source_type="machine"}},
    {name="M2_CMCount",          namespace="2", identifier_type="s", identifier="Line1.Machine2.MaintenanceStrategy.CMCount",          tags={source="Machine2", source_type="machine"}},

    # Quality Routing
    {name="M2_ScrapCount",           namespace="2", identifier_type="s", identifier="Line1.Machine2.QualityRouting.ScrapCount",           tags={source="Machine2", source_type="machine"}},
    {name="M2_ReworkCount",          namespace="2", identifier_type="s", identifier="Line1.Machine2.QualityRouting.ReworkCount",          tags={source="Machine2", source_type="machine"}},
    {name="M2_ReworkSuccessCount",   namespace="2", identifier_type="s", identifier="Line1.Machine2.QualityRouting.ReworkSuccessCount",   tags={source="Machine2", source_type="machine"}},
    {name="M2_ReworkSuccessRate",    namespace="2", identifier_type="s", identifier="Line1.Machine2.QualityRouting.ReworkSuccessRate",    tags={source="Machine2", source_type="machine"}},
    {name="M2_GoodCount",           namespace="2", identifier_type="s", identifier="Line1.Machine2.QualityRouting.GoodCount",            tags={source="Machine2", source_type="machine"}},

    # SPC - X-bar Chart
    {name="M2_SPC_XBar",        namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.XBarChart.XBar",    tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_XBar_UCL",    namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.XBarChart.UCL",     tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_XBar_CL",     namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.XBarChart.CL",      tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_XBar_LCL",    namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.XBarChart.LCL",     tags={source="Machine2", source_type="machine"}},
    # SPC - R Chart
    {name="M2_SPC_Range",       namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.RChart.Range",      tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_R_UCL",       namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.RChart.UCL",        tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_R_CL",        namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.RChart.CL",         tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_R_LCL",       namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.RChart.LCL",        tags={source="Machine2", source_type="machine"}},
    # SPC - Capability
    {name="M2_SPC_Cp",          namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Capability.Cp",     tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_Cpk",         namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Capability.Cpk",    tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_Pp",          namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Capability.Pp",     tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_Ppk",         namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Capability.Ppk",    tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_SigmaLevel",  namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Capability.SigmaLevel", tags={source="Machine2", source_type="machine"}},
    # SPC - Status
    {name="M2_SPC_InControl",   namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Status.InControl",   tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_Violations",  namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Status.Violations",  tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_TotalSamples",  namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Status.TotalSamples",  tags={source="Machine2", source_type="machine"}},
    {name="M2_SPC_NumSubgroups",  namespace="2", identifier_type="s", identifier="Line1.Machine2.SPC.Status.NumSubgroups",  tags={source="Machine2", source_type="machine"}},

    # =========================================================================
