# Telegraf OPC UA -> InfluxDB pipeline for Simantha Digital Twin
#
# Polls the OPC UA server's explicit string NodeIds and writes
# received values to InfluxDB.  Used to validate the OPC UA wire protocol
# pipeline against the CSV historian (ground truth).
#
# Designed for the full_feature_line scenario (2 machines, 1 buffer).
# Captures ~148 nodes across all feature categories.

[agent]
  interval = "1s"
  flush_interval = "5s"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "simantha-dev-token"
  organization = "simantha"
  bucket = "manufacturing"

[[inputs.opcua]]
  name = "opcua"
  endpoint = "opc.tcp://simantha:4840/simantha/"
  security_policy = "None"
  security_mode = "None"
  connect_timeout = "30s"
  request_timeout = "10s"

  nodes = [
    # =========================================================================
    # SYSTEM & LINE-LEVEL
    # =========================================================================
    {name="SimTime",           namespace="2", identifier_type="s", identifier="Line1.System.SimTime"},
    {name="Throughput",        namespace="2", identifier_type="s", identifier="Line1.System.Throughput"},

    # Line KPIs
    {name="TotalWIP",          namespace="2", identifier_type="s", identifier="Line1.LineKPIs.TotalWIP"},
    {name="TotalScrap",        namespace="2", identifier_type="s", identifier="Line1.LineKPIs.TotalScrap"},
    {name="ScrapRate",         namespace="2", identifier_type="s", identifier="Line1.LineKPIs.ScrapRate"},

    # Line OEE
    {name="LineOEE",           namespace="2", identifier_type="s", identifier="Line1.LineKPIs.LineOEE.OEE"},
    {name="LineAvailability",  namespace="2", identifier_type="s", identifier="Line1.LineKPIs.LineOEE.Availability"},
    {name="LinePerformance",   namespace="2", identifier_type="s", identifier="Line1.LineKPIs.LineOEE.Performance"},
    {name="LineQuality",       namespace="2", identifier_type="s", identifier="Line1.LineKPIs.LineOEE.Quality"},

    # Event Log
    {name="TotalEventsGenerated", namespace="2", identifier_type="s", identifier="Line1.EventLog.TotalEventsGenerated"},

    # System Maintenance
    {name="Sys_MaintenanceActive", namespace="2", identifier_type="s", identifier="Line1.Maintenance.MaintenanceActive"},
    {name="Sys_QueueLength",       namespace="2", identifier_type="s", identifier="Line1.Maintenance.QueueLength"},
    {name="Sys_TotalRepairs",      namespace="2", identifier_type="s", identifier="Line1.Maintenance.TotalRepairs"},

    # =========================================================================
    # MACHINE 1
    # =========================================================================
    # Basic state & counts
    {name="M1_State",          namespace="2", identifier_type="s", identifier="Line1.Machine1.State",              tags={source="Machine1", source_type="machine"}},
    {name="M1_PartCount",      namespace="2", identifier_type="s", identifier="Line1.Machine1.PartCount",          tags={source="Machine1", source_type="machine"}},
    {name="M1_Utilisation",    namespace="2", identifier_type="s", identifier="Line1.Machine1.Utilisation",        tags={source="Machine1", source_type="machine"}},
    {name="M1_TargetPPM",      namespace="2", identifier_type="s", identifier="Line1.Machine1.TargetPPM",          tags={source="Machine1", source_type="machine"}},
    {name="M1_ActualPPM",      namespace="2", identifier_type="s", identifier="Line1.Machine1.ActualPPM",          tags={source="Machine1", source_type="machine"}},

    # Time tracking
    {name="M1_BlockedTime",    namespace="2", identifier_type="s", identifier="Line1.Machine1.BlockedTime",        tags={source="Machine1", source_type="machine"}},
    {name="M1_StarvedTime",    namespace="2", identifier_type="s", identifier="Line1.Machine1.StarvedTime",        tags={source="Machine1", source_type="machine"}},
    {name="M1_DownTime",       namespace="2", identifier_type="s", identifier="Line1.Machine1.DownTime",           tags={source="Machine1", source_type="machine"}},
    {name="M1_ProcessingTime", namespace="2", identifier_type="s", identifier="Line1.Machine1.ProcessingTime",     tags={source="Machine1", source_type="machine"}},
    {name="M1_IdleTime",       namespace="2", identifier_type="s", identifier="Line1.Machine1.IdleTime",           tags={source="Machine1", source_type="machine"}},

    # Health
    {name="M1_HealthState",    namespace="2", identifier_type="s", identifier="Line1.Machine1.HealthState",        tags={source="Machine1", source_type="machine"}},
    {name="M1_HealthPercent",  namespace="2", identifier_type="s", identifier="Line1.Machine1.HealthPercent",      tags={source="Machine1", source_type="machine"}},

    # OEE
    {name="M1_OEE",            namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.OEE",            tags={source="Machine1", source_type="machine"}},
    {name="M1_Availability",   namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.Availability",   tags={source="Machine1", source_type="machine"}},
    {name="M1_Performance",    namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.Performance",    tags={source="Machine1", source_type="machine"}},
    {name="M1_Quality",        namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.Quality",        tags={source="Machine1", source_type="machine"}},
    {name="M1_GoodParts",      namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.GoodPartCount",  tags={source="Machine1", source_type="machine"}},
    {name="M1_DefectParts",    namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.DefectivePartCount", tags={source="Machine1", source_type="machine"}},
    {name="M1_TheoreticalOutput", namespace="2", identifier_type="s", identifier="Line1.Machine1.OEE.TheoreticalOutput", tags={source="Machine1", source_type="machine"}},

    # Alarms
    {name="M1_ActiveAlarmCount",     namespace="2", identifier_type="s", identifier="Line1.Machine1.Alarms.ActiveAlarmCount",       tags={source="Machine1", source_type="machine"}},
    {name="M1_MachineFailureActive", namespace="2", identifier_type="s", identifier="Line1.Machine1.Alarms.MachineFailureActive",   tags={source="Machine1", source_type="machine"}},
    {name="M1_MaintenanceActive",    namespace="2", identifier_type="s", identifier="Line1.Machine1.Alarms.MaintenanceActive",      tags={source="Machine1", source_type="machine"}},
    {name="M1_QualityAlertActive",   namespace="2", identifier_type="s", identifier="Line1.Machine1.Alarms.QualityAlertActive",     tags={source="Machine1", source_type="machine"}},

    # Failure Modes (full_feature_line uses Mechanical + Electrical)
    {name="M1_ActiveFailureMode",        namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.ActiveFailureMode",        tags={source="Machine1", source_type="machine"}},
    {name="M1_MechanicalFailureCount",   namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.MechanicalFailureCount",   tags={source="Machine1", source_type="machine"}},
    {name="M1_MechanicalTotalDowntime",  namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.MechanicalTotalDowntime",  tags={source="Machine1", source_type="machine"}},
    {name="M1_MechanicalMTBF",          namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.MechanicalMTBF",            tags={source="Machine1", source_type="machine"}},
    {name="M1_MechanicalMTTR",          namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.MechanicalMTTR",            tags={source="Machine1", source_type="machine"}},
    {name="M1_ElectricalFailureCount",   namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.ElectricalFailureCount",   tags={source="Machine1", source_type="machine"}},
    {name="M1_ElectricalTotalDowntime",  namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.ElectricalTotalDowntime",  tags={source="Machine1", source_type="machine"}},
    {name="M1_ElectricalMTBF",          namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.ElectricalMTBF",            tags={source="Machine1", source_type="machine"}},
    {name="M1_ElectricalMTTR",          namespace="2", identifier_type="s", identifier="Line1.Machine1.FailureModes.ElectricalMTTR",            tags={source="Machine1", source_type="machine"}},

    # Maintenance Strategy
    {name="M1_StrategyType",     namespace="2", identifier_type="s", identifier="Line1.Machine1.MaintenanceStrategy.StrategyType",     tags={source="Machine1", source_type="machine"}},
    {name="M1_NextPMScheduled",  namespace="2", identifier_type="s", identifier="Line1.Machine1.MaintenanceStrategy.NextPMScheduled",  tags={source="Machine1", source_type="machine"}},
    {name="M1_PMCount",          namespace="2", identifier_type="s", identifier="Line1.Machine1.MaintenanceStrategy.PMCount",          tags={source="Machine1", source_type="machine"}},
    {name="M1_CMCount",          namespace="2", identifier_type="s", identifier="Line1.Machine1.MaintenanceStrategy.CMCount",          tags={source="Machine1", source_type="machine"}},

    # Quality Routing
    {name="M1_ScrapCount",           namespace="2", identifier_type="s", identifier="Line1.Machine1.QualityRouting.ScrapCount",           tags={source="Machine1", source_type="machine"}},
    {name="M1_ReworkCount",          namespace="2", identifier_type="s", identifier="Line1.Machine1.QualityRouting.ReworkCount",          tags={source="Machine1", source_type="machine"}},
    {name="M1_ReworkSuccessCount",   namespace="2", identifier_type="s", identifier="Line1.Machine1.QualityRouting.ReworkSuccessCount",   tags={source="Machine1", source_type="machine"}},
    {name="M1_ReworkSuccessRate",    namespace="2", identifier_type="s", identifier="Line1.Machine1.QualityRouting.ReworkSuccessRate",    tags={source="Machine1", source_type="machine"}},
    {name="M1_GoodCount",           namespace="2", identifier_type="s", identifier="Line1.Machine1.QualityRouting.GoodCount",            tags={source="Machine1", source_type="machine"}},

    # SPC - X-bar Chart
    {name="M1_SPC_XBar",        namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.XBarChart.XBar",    tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_XBar_UCL",    namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.XBarChart.UCL",     tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_XBar_CL",     namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.XBarChart.CL",      tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_XBar_LCL",    namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.XBarChart.LCL",     tags={source="Machine1", source_type="machine"}},
    # SPC - R Chart
    {name="M1_SPC_Range",       namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.RChart.Range",      tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_R_UCL",       namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.RChart.UCL",        tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_R_CL",        namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.RChart.CL",         tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_R_LCL",       namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.RChart.LCL",        tags={source="Machine1", source_type="machine"}},
    # SPC - Capability
    {name="M1_SPC_Cp",          namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Capability.Cp",     tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_Cpk",         namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Capability.Cpk",    tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_Pp",          namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Capability.Pp",     tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_Ppk",         namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Capability.Ppk",    tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_SigmaLevel",  namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Capability.SigmaLevel", tags={source="Machine1", source_type="machine"}},
    # SPC - Status
    {name="M1_SPC_InControl",   namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Status.InControl",   tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_Violations",  namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Status.Violations",  tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_TotalSamples",  namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Status.TotalSamples",  tags={source="Machine1", source_type="machine"}},
    {name="M1_SPC_NumSubgroups",  namespace="2", identifier_type="s", identifier="Line1.Machine1.SPC.Status.NumSubgroups",  tags={source="Machine1", source_type="machine"}},

    # =========================================================================
    # MACHINE 2
    # =========================================================================
    # Basic state & counts
    {name="M2_State",          namespace="2", identifier_type="s", identifier="Line1.Machine2.State",              tags={source="Machine2", source_type="machine"}},
    {name="M2_PartCount",      namespace="2", identifier_type="s", identifier="Line1.Machine2.PartCount",          tags={source="Machine2", source_type="machine"}},
    {name="M2_Utilisation",    namespace="2", identifier_type="s", identifier="Line1.Machine2.Utilisation",        tags={source="Machine2", source_type="machine"}},
    {name="M2_TargetPPM",      namespace="2", identifier_type="s", identifier="Line1.Machine2.TargetPPM",          tags={source="Machine2", source_type="machine"}},
    {name="M2_ActualPPM",      namespace="2", identifier_type="s", identifier="Line1.Machine2.ActualPPM",          tags={source="Machine2", source_type="machine"}},

    # Time tracking
    {name="M2_BlockedTime",    namespace="2", identifier_type="s", identifier="Line1.Machine2.BlockedTime",        tags={source="Machine2", source_type="machine"}},
    {name="M2_StarvedTime",    namespace="2", identifier_type="s", identifier="Line1.Machine2.StarvedTime",        tags={source="Machine2", source_type="machine"}},
    {name="M2_DownTime",       namespace="2", identifier_type="s", identifier="Line1.Machine2.DownTime",           tags={source="Machine2", source_type="machine"}},
    {name="M2_ProcessingTime", namespace="2", identifier_type="s", identifier="Line1.Machine2.ProcessingTime",     tags={source="Machine2", source_type="machine"}},
    {name="M2_IdleTime",       namespace="2", identifier_type="s", identifier="Line1.Machine2.IdleTime",           tags={source="Machine2", source_type="machine"}},

    # Health
    {name="M2_HealthState",    namespace="2", identifier_type="s", identifier="Line1.Machine2.HealthState",        tags={source="Machine2", source_type="machine"}},
    {name="M2_HealthPercent",  namespace="2", identifier_type="s", identifier="Line1.Machine2.HealthPercent",      tags={source="Machine2", source_type="machine"}},

    # OEE
    {name="M2_OEE",            namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.OEE",            tags={source="Machine2", source_type="machine"}},
    {name="M2_Availability",   namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.Availability",   tags={source="Machine2", source_type="machine"}},
    {name="M2_Performance",    namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.Performance",    tags={source="Machine2", source_type="machine"}},
    {name="M2_Quality",        namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.Quality",        tags={source="Machine2", source_type="machine"}},
    {name="M2_GoodParts",      namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.GoodPartCount",  tags={source="Machine2", source_type="machine"}},
    {name="M2_DefectParts",    namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.DefectivePartCount", tags={source="Machine2", source_type="machine"}},
    {name="M2_TheoreticalOutput", namespace="2", identifier_type="s", identifier="Line1.Machine2.OEE.TheoreticalOutput", tags={source="Machine2", source_type="machine"}},

    # Alarms
    {name="M2_ActiveAlarmCount",     namespace="2", identifier_type="s", identifier="Line1.Machine2.Alarms.ActiveAlarmCount",       tags={source="Machine2", source_type="machine"}},
    {name="M2_MachineFailureActive", namespace="2", identifier_type="s", identifier="Line1.Machine2.Alarms.MachineFailureActive",   tags={source="Machine2", source_type="machine"}},
    {name="M2_MaintenanceActive",    namespace="2", identifier_type="s", identifier="Line1.Machine2.Alarms.MaintenanceActive",      tags={source="Machine2", source_type="machine"}},
    {name="M2_QualityAlertActive",   namespace="2", identifier_type="s", identifier="Line1.Machine2.Alarms.QualityAlertActive",     tags={source="Machine2", source_type="machine"}},

    # Failure Modes
    {name="M2_ActiveFailureMode",        namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.ActiveFailureMode",        tags={source="Machine2", source_type="machine"}},
    {name="M2_MechanicalFailureCount",   namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.MechanicalFailureCount",   tags={source="Machine2", source_type="machine"}},
    {name="M2_MechanicalTotalDowntime",  namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.MechanicalTotalDowntime",  tags={source="Machine2", source_type="machine"}},
    {name="M2_MechanicalMTBF",          namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.MechanicalMTBF",            tags={source="Machine2", source_type="machine"}},
    {name="M2_MechanicalMTTR",          namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.MechanicalMTTR",            tags={source="Machine2", source_type="machine"}},
    {name="M2_ElectricalFailureCount",   namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.ElectricalFailureCount",   tags={source="Machine2", source_type="machine"}},
    {name="M2_ElectricalTotalDowntime",  namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.ElectricalTotalDowntime",  tags={source="Machine2", source_type="machine"}},
    {name="M2_ElectricalMTBF",          namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.ElectricalMTBF",            tags={source="Machine2", source_type="machine"}},
    {name="M2_ElectricalMTTR",          namespace="2", identifier_type="s", identifier="Line1.Machine2.FailureModes.ElectricalMTTR",            tags={source="Machine2", source_type="machine"}},

