    {name="CurrShift_Perf",        namespace="2", identifier_type="s", identifier="Line1.Shift.CurrentShift.Performance"},
    {name="CurrShift_Qual",        namespace="2", identifier_type="s", identifier="Line1.Shift.CurrentShift.Quality"},
