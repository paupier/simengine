# Telegraf OPC UA → InfluxDB pipeline for Simantha Digital Twin
#
# Subscribes to the OPC UA server's explicit string NodeIds and writes
# received values to InfluxDB.  Used to validate the OPC UA wire protocol
# pipeline against the CSV historian (ground truth).
#
# Designed for the full_feature_line scenario (2 machines, 1 buffer).
# For larger topologies, generate this file with tools/gen_telegraf_conf.py.

[agent]
  interval = "1s"
  flush_interval = "5s"

# ── Output: InfluxDB v2 ────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "simantha-dev-token"
  organization = "simantha"
  bucket = "manufacturing"

# ── Input: OPC UA Listener (subscription-based) ───────────────────────────
[[inputs.opcua_listener]]
  name = "opcua"
  endpoint = "opc.tcp://simantha:4840/simantha/"
  security_policy = "None"
  security_mode = "None"
  connect_timeout = "30s"
  request_timeout = "10s"
  subscription_interval = "1s"

  # ── System-level metrics ──────────────────────────────────────────────
  [[inputs.opcua_listener.group]]
    name = "system"
    namespace = "2"
    identifier_type = "s"
    default_tags = { source_type = "system" }

    [[inputs.opcua_listener.group.nodes]]
      name = "SimTime"
      identifier = "Line1.System.SimTime"
    [[inputs.opcua_listener.group.nodes]]
      name = "Throughput"
      identifier = "Line1.System.Throughput"

  # ── Line KPIs ─────────────────────────────────────────────────────────
  [[inputs.opcua_listener.group]]
    name = "line_kpis"
    namespace = "2"
    identifier_type = "s"
    default_tags = { source_type = "line" }

    [[inputs.opcua_listener.group.nodes]]
      name = "TotalWIP"
      identifier = "Line1.LineKPIs.TotalWIP"
    [[inputs.opcua_listener.group.nodes]]
      name = "LineOEE"
      identifier = "Line1.LineKPIs.LineOEE.OEE"
    [[inputs.opcua_listener.group.nodes]]
      name = "LineAvailability"
      identifier = "Line1.LineKPIs.LineOEE.Availability"
    [[inputs.opcua_listener.group.nodes]]
      name = "LinePerformance"
      identifier = "Line1.LineKPIs.LineOEE.Performance"
    [[inputs.opcua_listener.group.nodes]]
      name = "LineQuality"
      identifier = "Line1.LineKPIs.LineOEE.Quality"
    [[inputs.opcua_listener.group.nodes]]
      name = "TotalScrap"
      identifier = "Line1.LineKPIs.TotalScrap"
    [[inputs.opcua_listener.group.nodes]]
      name = "ScrapRate"
      identifier = "Line1.LineKPIs.ScrapRate"

  # ── Machine1 ──────────────────────────────────────────────────────────
  [[inputs.opcua_listener.group]]
    name = "machine1"
    namespace = "2"
    identifier_type = "s"
    default_tags = { source = "Machine1", source_type = "machine" }

    [[inputs.opcua_listener.group.nodes]]
      name = "State"
      identifier = "Line1.Machine1.State"
    [[inputs.opcua_listener.group.nodes]]
      name = "PartCount"
      identifier = "Line1.Machine1.PartCount"
    [[inputs.opcua_listener.group.nodes]]
      name = "Utilisation"
      identifier = "Line1.Machine1.Utilisation"
    [[inputs.opcua_listener.group.nodes]]
      name = "TargetPPM"
      identifier = "Line1.Machine1.TargetPPM"
    [[inputs.opcua_listener.group.nodes]]
      name = "ActualPPM"
      identifier = "Line1.Machine1.ActualPPM"
    [[inputs.opcua_listener.group.nodes]]
      name = "OEE"
      identifier = "Line1.Machine1.OEE.OEE"
    [[inputs.opcua_listener.group.nodes]]
      name = "Availability"
      identifier = "Line1.Machine1.OEE.Availability"
    [[inputs.opcua_listener.group.nodes]]
      name = "Performance"
      identifier = "Line1.Machine1.OEE.Performance"
    [[inputs.opcua_listener.group.nodes]]
      name = "Quality"
      identifier = "Line1.Machine1.OEE.Quality"
    [[inputs.opcua_listener.group.nodes]]
      name = "GoodPartCount"
      identifier = "Line1.Machine1.OEE.GoodPartCount"
    [[inputs.opcua_listener.group.nodes]]
      name = "DefectivePartCount"
      identifier = "Line1.Machine1.OEE.DefectivePartCount"

  # ── Machine2 ──────────────────────────────────────────────────────────
  [[inputs.opcua_listener.group]]
    name = "machine2"
    namespace = "2"
    identifier_type = "s"
    default_tags = { source = "Machine2", source_type = "machine" }

    [[inputs.opcua_listener.group.nodes]]
      name = "State"
      identifier = "Line1.Machine2.State"
    [[inputs.opcua_listener.group.nodes]]
      name = "PartCount"
      identifier = "Line1.Machine2.PartCount"
    [[inputs.opcua_listener.group.nodes]]
      name = "Utilisation"
      identifier = "Line1.Machine2.Utilisation"
    [[inputs.opcua_listener.group.nodes]]
      name = "TargetPPM"
      identifier = "Line1.Machine2.TargetPPM"
    [[inputs.opcua_listener.group.nodes]]
      name = "ActualPPM"
      identifier = "Line1.Machine2.ActualPPM"
    [[inputs.opcua_listener.group.nodes]]
      name = "OEE"
      identifier = "Line1.Machine2.OEE.OEE"
    [[inputs.opcua_listener.group.nodes]]
      name = "Availability"
      identifier = "Line1.Machine2.OEE.Availability"
    [[inputs.opcua_listener.group.nodes]]
      name = "Performance"
      identifier = "Line1.Machine2.OEE.Performance"
    [[inputs.opcua_listener.group.nodes]]
      name = "Quality"
      identifier = "Line1.Machine2.OEE.Quality"
    [[inputs.opcua_listener.group.nodes]]
      name = "GoodPartCount"
      identifier = "Line1.Machine2.OEE.GoodPartCount"
    [[inputs.opcua_listener.group.nodes]]
      name = "DefectivePartCount"
      identifier = "Line1.Machine2.OEE.DefectivePartCount"

  # ── Buffer1 ───────────────────────────────────────────────────────────
  [[inputs.opcua_listener.group]]
    name = "buffer1"
    namespace = "2"
    identifier_type = "s"
    default_tags = { source = "Buffer1", source_type = "buffer" }

    [[inputs.opcua_listener.group.nodes]]
      name = "CurrentLevel"
      identifier = "Line1.Buffer1.CurrentLevel"
    [[inputs.opcua_listener.group.nodes]]
      name = "Capacity"
      identifier = "Line1.Buffer1.Capacity"
