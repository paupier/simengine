    # =========================================================================
    {name="B1_Level",          namespace="2", identifier_type="s", identifier="Line1.Buffer1.CurrentLevel",         tags={source="Buffer1", source_type="buffer"}},
    {name="B1_Capacity",       namespace="2", identifier_type="s", identifier="Line1.Buffer1.Capacity",             tags={source="Buffer1", source_type="buffer"}},

    # =========================================================================
