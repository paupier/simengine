    {name="Shift_Name",            namespace="2", identifier_type="s", identifier="Line1.Shift.CurrentShiftName"},
    {name="Shift_StartTime",       namespace="2", identifier_type="s", identifier="Line1.Shift.ShiftStartTime"},
    {name="Shift_EndTime",         namespace="2", identifier_type="s", identifier="Line1.Shift.ShiftEndTime"},
    {name="Shift_Duration",        namespace="2", identifier_type="s", identifier="Line1.Shift.ShiftDuration"},
    {name="Shift_Elapsed",         namespace="2", identifier_type="s", identifier="Line1.Shift.ShiftElapsedTime"},
    {name="Shift_Remaining",       namespace="2", identifier_type="s", identifier="Line1.Shift.ShiftTimeRemaining"},

    # Current shift metrics
    {name="CurrShift_Parts",       namespace="2", identifier_type="s", identifier="Line1.Shift.CurrentShift.PartsProduced"},
    {name="CurrShift_GoodParts",   namespace="2", identifier_type="s", identifier="Line1.Shift.CurrentShift.GoodParts"},
    {name="CurrShift_DefParts",    namespace="2", identifier_type="s", identifier="Line1.Shift.CurrentShift.DefectiveParts"},
    {name="CurrShift_DefRate",     namespace="2", identifier_type="s", identifier="Line1.Shift.CurrentShift.DefectRate"},
