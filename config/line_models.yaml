# ---------------------------------------------------------------------------
# 8-machine comparative scenarios
#
# Naming:  8m_{cbm|rtf}_{balanced|poor_quality|high_downtime}
#   cbm = CBM maintainer (strategy: bottleneck, capacity 2)
#   rtf = run-to-failure (no maintainer)
#
# Balanced reference:
#   full_feature_8_machine_line        (CBM)
#   full_feature_8_machine_line_rtf    (RTF)
#
# All variants share:
#   • Same 8 cycle-times:  M1=1.0, M2=1.2, M3=0.9, M4=1.1,
#                           M5=1.0, M6=0.8, M7=1.3, M8=1.0
