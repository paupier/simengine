# ---- High Downtime / CBM --------------------------------------------------
# Target profile: Availability ~65%, Quality ~97%, OEE ~63%
# Machines degrade quickly (p_degrade 5× baseline) and take a long time to
# repair (MTTR ~65s mechanical, ~45s electrical).  Quality is good when
# running — defect rate is low and health-quality correlation is weak.
# CBM maintainer intervenes at health-state 2 (before failure), so downtime
# events are frequent but shorter than RTF equivalent.
8m_cbm_high_downtime:
  description: "8-machine CBM line: frequent failures, long repairs, good quality. Comparative scenario for availability-driven OEE loss with planned interventions."
