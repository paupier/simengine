# Manufacturing Line Model Definitions

# Scenario A: Balanced Line
balanced_line:
  machines:
    - name: M1
      cycle_time: 1.0        # seconds (or use target_ppm: 60 to derive cycle_time)
      failure_rate: 0.0      # failures per hour
      repair_time: 10.0      # seconds

    - name: M2
      cycle_time: 1.0
      failure_rate: 0.0
      repair_time: 10.0

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

# Scenario B: Bottleneck at M1
bottleneck_line:
  machines:
    - name: M1
      cycle_time: 2.0        # Bottleneck
      failure_rate: 0.0
      repair_time: 10.0

    - name: M2
      cycle_time: 1.0
      failure_rate: 0.0
      repair_time: 10.0

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

# Scenario C: With Failures
failure_line:
  machines:
    - name: M1
      cycle_time: 1.0
      failure_rate: 1.2      # ~1 failure per 50s
      repair_time: 10.0

    - name: M2
      cycle_time: 1.0
      failure_rate: 0.0
      repair_time: 10.0

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

# Scenario D: Extended 3-Machine Line
extended_line:
  description: "3-machine serial line with 2 buffers and degradation on M1"
  machines:
    - name: M1
      cycle_time: 1.0
      enable_degradation: true
      degradation_matrix: [[0.99, 0.01], [0.0, 1.0]]
      cbm_threshold: 1

    - name: M2
      cycle_time: 1.5        # Bottleneck
      enable_degradation: false

    - name: M3
      cycle_time: 1.0
      enable_degradation: false

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

    - name: B2
      capacity: 5
      upstream: M2
      downstream: M3

  maintainer:
    enabled: true
    capacity: 1

# Scenario E: 4-Machine Long Line (Scalability Test)
long_line:
  description: "4-machine serial line for stress testing"
  machines:
    - name: M1
      cycle_time: 1.0
      enable_degradation: false

    - name: M2
      cycle_time: 1.0
      enable_degradation: false

    - name: M3
      cycle_time: 1.0
      enable_degradation: false

    - name: M4
      cycle_time: 1.0
      enable_degradation: false

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

    - name: B2
      capacity: 10
      upstream: M2
      downstream: M3

    - name: B3
      capacity: 10
      upstream: M3
      downstream: M4

  maintainer:
    enabled: false

# Scenario F: Quality Line
quality_line:
  description: "2-machine line with health-correlated quality degradation"
  machines:
    - name: M1
      cycle_time: 1.0
      enable_degradation: true
      degradation_matrix: [[0.99, 0.01], [0.0, 1.0]]
      cbm_threshold: 1
      defect_rate: 0.02          # 2% base defect rate (8% when failed)
      health_multiplier: 3.0     # 3x defect rate multiplier

    - name: M2
      cycle_time: 1.0
      enable_degradation: false
      defect_rate: 0.01          # 1% fixed defect rate

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  maintainer:
    enabled: true
    capacity: 1

# Scenario G: Advanced Failure Modes (Multiple Failure Types)
advanced_failure_line:
  description: "2-machine line with realistic MTTF/MTTR distributions and multiple failure types"
  machines:
    - name: M1
      cycle_time: 1
      enable_advanced_failures: true  # Advanced failure modeling

      # Multiple failure modes with competing risks
      failure_modes:
        - name: mechanical
          type: wearout              # Weibull distribution (increasing hazard rate)
          mttf:
            distribution: weibull
            shape: 2.5               # Beta > 1 = increasing failure rate
            scale: 500               # Characteristic life (time units)
          mttr:
            distribution: lognormal
            mean: 15                 # Mean repair time
            std: 5                   # Standard deviation

        - name: electrical
          type: random               # Exponential (constant hazard rate)
          mttf:
            distribution: exponential
            mean: 1000               # MTTF in time units
          mttr:
            distribution: lognormal
            mean: 10
            std: 3

      # Maintenance strategy
      maintenance_strategy:
        type: predictive           # corrective, preventive, or predictive
        cbm_threshold: 1           # For predictive: health threshold to trigger maintenance

    - name: M2
      cycle_time: 1
      enable_degradation: false  # No failures on M2 (for comparison)

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  maintainer:
    enabled: true
    capacity: 1


# Scenario H: SPC Quality Analytics
spc_quality_line:
  description: "2-machine line with Statistical Process Control (SPC) analytics for quality monitoring"

  machines:
    - name: M1
      cycle_time: 1
      enable_spc: true  # Enable SPC analytics

      # SPC configuration
      spc:
        characteristic: "cycle_time"      # What to measure (cycle_time, dimension, etc.)
        subgroup_size: 5                  # Samples per subgroup
        num_subgroups: 25                 # Subgroups for control limit calculation
        usl: 1.2                          # Upper specification limit (20% above nominal)
        lsl: 0.8                          # Lower specification limit (20% below nominal)
        target: 1.0                       # Target value (nominal cycle time)
        enable_western_electric: true     # Enable out-of-control detection rules
        measurement_noise: 0.02          # Coefficient of variation for measurement noise

      # Optional: Add defect rate for quality tracking
      defect_rate: 0.02                   # 2% base defect rate

    - name: M2
      cycle_time: 1
      enable_spc: true  # Enable SPC on M2 as well

      spc:
        characteristic: "cycle_time"
        subgroup_size: 5
        num_subgroups: 25
        usl: 1.3                          # Slightly looser tolerances on M2
        lsl: 0.7
        target: 1.0
        enable_western_electric: true
        measurement_noise: 0.02

      defect_rate: 0.01  # 1% base defect rate (better quality)

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  maintainer:
    enabled: false  # No failures in this scenario (focus on quality)


# Scenario I: Combined Advanced Failures + SPC
advanced_spc_line:
  description: "2-machine line combining advanced failure modes with SPC quality analytics"

  machines:
    - name: M1
      cycle_time: 1
      enable_advanced_failures: true  # Advanced failures
      enable_spc: true                # SPC analytics

      # Multiple failure modes
      failure_modes:
        - name: mechanical
          type: wearout
          mttf:
            distribution: weibull
            shape: 2.5
            scale: 800               # Less frequent failures for SPC stability
          mttr:
            distribution: lognormal
            mean: 15
            std: 5

        - name: electrical
          type: random
          mttf:
            distribution: exponential
            mean: 1500
          mttr:
            distribution: lognormal
            mean: 10
            std: 3

      # SPC configuration (monitoring cycle time)
      spc:
        characteristic: "cycle_time"
        subgroup_size: 5
        num_subgroups: 25
        usl: 1.2
        lsl: 0.8
        target: 1.0
        enable_western_electric: true

      # Maintenance strategy
      maintenance_strategy:
        type: predictive
        cbm_threshold: 1

      # Quality correlation with health
      defect_rate: 0.01
      health_multiplier: 5.0  # Defect rate increases 5x when failed

    - name: M2
      cycle_time: 1
      enable_spc: true  # SPC only (no failures)

      spc:
        characteristic: "cycle_time"
        subgroup_size: 5
        num_subgroups: 25
        usl: 1.15
        lsl: 0.85
        target: 1.0
        enable_western_electric: true

      defect_rate: 0.005  # Very low defect rate

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  maintainer:
    enabled: true
    capacity: 1


# Scenario J: Shift Tracking
shift_line:
  description: "2-machine line with 8-hour shift tracking - production resets per shift"

  machines:
    - name: M1
      cycle_time: 1
      defect_rate: 0.02        # 2% base defect rate

    - name: M2
      cycle_time: 1
      defect_rate: 0.01        # 1% base defect rate

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  maintainer:
    enabled: false

  # Shift configuration
  shifts:
    schedule:
      - name: "Day Shift"
        duration: 28800        # 8 hours in seconds (8 * 3600)
        start_offset: 0

      - name: "Evening Shift"
        duration: 28800        # 8 hours
        start_offset: 28800

      - name: "Night Shift"
        duration: 28800        # 8 hours
        start_offset: 57600


# Scenario K: Shift Tracking with Advanced Features
advanced_shift_line:
  description: "2-machine line with shift tracking, failures, SPC, and quality modeling"

  machines:
    - name: M1
      cycle_time: 1
      enable_advanced_failures: true
      enable_spc: true

      # Advanced failures
      failure_modes:
        - name: mechanical
          type: wearout
          mttf:
            distribution: weibull
            shape: 2.5
            scale: 1000        # Longer MTTF for shift-scale operations
          mttr:
            distribution: lognormal
            mean: 15
            std: 5

      # SPC monitoring
      spc:
        characteristic: "cycle_time"
        subgroup_size: 5
        num_subgroups: 25
        usl: 1.2
        lsl: 0.8
        target: 1.0
        enable_western_electric: true

      # Quality
      defect_rate: 0.01
      health_multiplier: 5.0

      # Maintenance
      maintenance_strategy:
        type: predictive
        cbm_threshold: 1

    - name: M2
      cycle_time: 1
      defect_rate: 0.005       # Better quality on M2

  buffers:
    - name: B1
      capacity: 15
      upstream: M1
      downstream: M2

  maintainer:
    enabled: true
    capacity: 1

  # 3-shift operation (24/7 coverage)
  shifts:
    schedule:
      - name: "Day Shift"
        duration: 28800        # 8 hours (06:00-14:00)
        start_offset: 0

      - name: "Evening Shift"
        duration: 28800        # 8 hours (14:00-22:00)
        start_offset: 28800

      - name: "Night Shift"
        duration: 28800        # 8 hours (22:00-06:00)
        start_offset: 57600

# Scenario L: Historian Line (CSV event logging + failures + shifts)
historian_line:
  description: "2-machine line with event historian logging to CSV"

  machines:
    - name: M1
      cycle_time: 1
      enable_degradation: true
      defect_rate: 0.02
      health_multiplier: 5.0

    - name: M2
      cycle_time: 1
      defect_rate: 0.005

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  maintainer:
    enabled: true
    capacity: 1

  shifts:
    schedule:
      - name: "Day Shift"
        duration: 28800
        start_offset: 0
      - name: "Night Shift"
        duration: 28800
        start_offset: 28800

  # Event historian configuration
  historian:
    enabled: true

    csv:
      enabled: true
      output_dir: "results/historian"
      max_file_size_mb: 50
      rotate_on_shift: true

    influxdb:
      enabled: false
      url: "http://localhost:8086"
      token: "${INFLUXDB_TOKEN}"
      org: "simantha"
      bucket: "manufacturing"
      batch_size: 100

    neo4j:
      enabled: false
      uri: "bolt://localhost:7687"
      user: "neo4j"
      password: "${NEO4J_PASSWORD}"
      track_parts: true
      max_parts: 10000

    events:
      state_changes: true
      alarms: true
      shift_changes: true
      maintenance: true
      spc_violations: true
      buffer_level_changes: true
      production_summary: true
      production_summary_interval: 60

# Scenario M: Scrap Routing
scrap_line:
  description: "2-machine line with scrap sinks for defective parts"

  machines:
    - name: M1
      cycle_time: 1
      enable_degradation: true
      degradation_matrix: [[0.99, 0.01], [0.0, 1.0]]
      cbm_threshold: 1
      quality_routing:
        enabled: true
        mode: scrap
        defect_rate: 0.05
        health_multiplier: 3.0
        enable_health_correlation: true
        scrap_sink: ScrapBin1

    - name: M2
      cycle_time: 1
      quality_routing:
        enabled: true
        mode: scrap
        defect_rate: 0.02
        scrap_sink: ScrapBin2

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  scrap_sinks:
    - name: ScrapBin1
    - name: ScrapBin2

  maintainer:
    enabled: true
    capacity: 1

# Scenario N: Rework Line
rework_line:
  description: "2-machine line with virtual rework before scrapping"

  machines:
    - name: M1
      cycle_time: 1
      quality_routing:
        enabled: true
        mode: scrap_and_rework
        defect_rate: 0.08
        rework_success_rate: 0.7
        max_rework: 3
        scrap_sink: ScrapBin1

    - name: M2
      cycle_time: 1
      quality_routing:
        enabled: true
        mode: scrap
        defect_rate: 0.02
        scrap_sink: ScrapBin2

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  scrap_sinks:
    - name: ScrapBin1
    - name: ScrapBin2

  maintainer:
    enabled: false

