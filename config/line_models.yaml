# Manufacturing Line Model Definitions

# Scenario A: Balanced Line
balanced_line:
  machines:
    - name: M1
      cycle_time: 1.0        # seconds
      failure_rate: 0.0      # failures per hour
      repair_time: 10.0      # seconds

    - name: M2
      cycle_time: 1.0
      failure_rate: 0.0
      repair_time: 10.0

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

# Scenario B: Bottleneck at M1
bottleneck_line:
  machines:
    - name: M1
      cycle_time: 2.0        # Bottleneck
      failure_rate: 0.0
      repair_time: 10.0

    - name: M2
      cycle_time: 1.0
      failure_rate: 0.0
      repair_time: 10.0

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

# Scenario C: With Failures
failure_line:
  machines:
    - name: M1
      cycle_time: 1.0
      failure_rate: 1.2      # ~1 failure per 50s
      repair_time: 10.0

    - name: M2
      cycle_time: 1.0
      failure_rate: 0.0
      repair_time: 10.0

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

# Scenario D: Extended 3-Machine Line (Phase 7)
extended_line:
  description: "3-machine serial line with 2 buffers and degradation on M1"
  machines:
    - name: M1
      cycle_time: 1.0
      enable_degradation: true
      degradation_matrix: [[0.99, 0.01], [0.0, 1.0]]
      cbm_threshold: 1

    - name: M2
      cycle_time: 1.5        # Bottleneck
      enable_degradation: false

    - name: M3
      cycle_time: 1.0
      enable_degradation: false

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

    - name: B2
      capacity: 5
      upstream: M2
      downstream: M3

  maintainer:
    enabled: true
    capacity: 1

# Scenario E: 4-Machine Long Line (Phase 7 - Scalability Test)
long_line:
  description: "4-machine serial line for stress testing"
  machines:
    - name: M1
      cycle_time: 1.0
      enable_degradation: false

    - name: M2
      cycle_time: 1.0
      enable_degradation: false

    - name: M3
      cycle_time: 1.0
      enable_degradation: false

    - name: M4
      cycle_time: 1.0
      enable_degradation: false

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

    - name: B2
      capacity: 10
      upstream: M2
      downstream: M3

    - name: B3
      capacity: 10
      upstream: M3
      downstream: M4

  maintainer:
    enabled: false

# Scenario F: Quality Line (Phase 8 - Quality Modeling)
quality_line:
  description: "2-machine line with health-correlated quality degradation"
  machines:
    - name: M1
      cycle_time: 1.0
      enable_degradation: true
      degradation_matrix: [[0.99, 0.01], [0.0, 1.0]]
      cbm_threshold: 1
      defect_rate: 0.02          # Phase 8: 2% base defect rate (8% when failed)
      health_multiplier: 3.0     # Phase 8: 3x defect rate multiplier

    - name: M2
      cycle_time: 1.0
      enable_degradation: false
      defect_rate: 0.01          # Phase 8: 1% fixed defect rate

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  maintainer:
    enabled: true
    capacity: 1

# Scenario G: Advanced Failure Modes (Phase 10 - Multiple Failure Types)
advanced_failure_line:
  description: "2-machine line with realistic MTTF/MTTR distributions and multiple failure types"
  machines:
    - name: M1
      cycle_time: 1
      enable_advanced_failures: true  # Phase 10: Advanced failure modeling

      # Multiple failure modes with competing risks
      failure_modes:
        - name: mechanical
          type: wearout              # Weibull distribution (increasing hazard rate)
          mttf:
            distribution: weibull
            shape: 2.5               # Beta > 1 = increasing failure rate
            scale: 500               # Characteristic life (time units)
          mttr:
            distribution: lognormal
            mean: 15                 # Mean repair time
            std: 5                   # Standard deviation

        - name: electrical
          type: random               # Exponential (constant hazard rate)
          mttf:
            distribution: exponential
            mean: 1000               # MTTF in time units
          mttr:
            distribution: lognormal
            mean: 10
            std: 3

      # Maintenance strategy
      maintenance_strategy:
        type: predictive           # corrective, preventive, or predictive
        cbm_threshold: 1           # For predictive: health threshold to trigger maintenance

    - name: M2
      cycle_time: 1
      enable_degradation: false  # No failures on M2 (for comparison)

  buffers:
    - name: B1
      capacity: 10
      upstream: M1
      downstream: M2

  maintainer:
    enabled: true
    capacity: 1
