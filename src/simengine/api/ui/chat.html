{% extends "base.html" %}
{% block title %}simengine — assistant{% endblock %}
{% block styles %}
<style>
  .chat-layout { display: grid; grid-template-rows: auto 1fr auto; gap: 12px;
    height: calc(100vh - 170px); min-height: 420px; }
  .chat-config { display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 10px 14px; }
  .chat-config label { font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--ink-2); }
  .chat-config input[type=password], .chat-config select {
    font-family: var(--mono); font-size: 13px; padding: 5px 8px;
    border: 1px solid var(--hairline); background: #fff; }
  .chat-config .keynote { font-size: 11px; color: var(--ink-2); }
  .chat-pane { overflow-y: auto; padding: 14px 16px; display: flex;
    flex-direction: column; gap: 10px; }
  .msg-user, .msg-assistant { max-width: 72ch; padding: 8px 12px;
    font-size: 13.5px; white-space: pre-wrap; }
  .msg-user { align-self: flex-end; background: var(--ink); color: var(--panel); }
  .msg-assistant { align-self: flex-start; background: #fff;
    border: 1px solid var(--hairline); }
  .tool-trace { align-self: flex-start; font-family: var(--mono);
    font-size: 11.5px; color: var(--ink-2); border-left: 3px solid var(--hairline);
    padding: 2px 10px; max-width: 80ch; overflow-wrap: break-word; }
  .tool-trace.err { border-left-color: var(--st-failed); color: var(--st-failed); }
  .chat-input { display: flex; gap: 8px; }
  .chat-input textarea { flex: 1; font-family: var(--sans); font-size: 13.5px;
    padding: 8px 10px; border: 1px solid var(--hairline); resize: none;
    height: 60px; }
  .disabled-note { padding: 14px 16px; }
</style>
{% endblock %}
{% block content %}
  <h2 class="eyebrow">Assistant</h2>
  <div class="card disabled-note" id="chat-disabled" hidden>
    <span class="mono" id="chat-disabled-msg"></span>
  </div>
  <div class="chat-layout" id="chat-ui">
    <div class="card chat-config">
      <label for="chat-key">API key</label>
      <input type="password" id="chat-key" placeholder="sk-ant-..." size="28"
        autocomplete="off">
      <span class="keynote">held in memory for this session only — never
        written to disk or logs</span>
      <label for="chat-model">Model</label>
      <select id="chat-model"></select>
      <button id="chat-clear" class="quiet">Clear conversation</button>
    </div>
    <div class="card chat-pane" id="chat-pane"></div>
    <div class="chat-input">
      <textarea id="chat-text"
        placeholder="Ask about the line — e.g. what's the oil temperature on Press01?"></textarea>
      <button id="chat-send">Send</button>
    </div>
  </div>
{% endblock %}
{% block scripts %}
<script>
  const pane = $("chat-pane");

  function addBubble(cls, text) {
    const el = document.createElement("div");
    el.className = cls;
    el.textContent = text;
    pane.appendChild(el);
    pane.scrollTop = pane.scrollHeight;
    return el;
  }

  async function loadChatStatus() {
    const s = await jget("/api/v1/chat/status");
    if (!s.available) {
      $("chat-ui").hidden = true;
      $("chat-disabled").hidden = false;
      $("chat-disabled-msg").textContent =
        "Chat is not installed. Enable it with: pip install simengine[chat]";
      return;
    }
    $("chat-model").innerHTML =
      s.models.map(m => `<option${m === s.model ? " selected" : ""}>${m}</option>`).join("");
    if (s.chat_key_set) $("chat-key").placeholder = "key set for this session";
  }

  async function sendChat() {
    const text = $("chat-text").value.trim();
    if (!text) return;
    $("chat-text").value = "";
    $("chat-send").disabled = true;
    addBubble("msg-user", text);

    const body = {message: text, model: $("chat-model").value};
    const key = $("chat-key").value.trim();
    if (key) { body.api_key = key; $("chat-key").value = "";
      $("chat-key").placeholder = "key set for this session"; }

    try {
      const resp = await fetch("/api/v1/chat", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        addBubble("tool-trace err", err.error || `HTTP ${resp.status}`);
        return;
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let current = null;
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});
        let idx;
        while ((idx = buffer.indexOf("\n\n")) >= 0) {
          const chunk = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          if (!chunk.startsWith("data: ")) continue;
          const ev = JSON.parse(chunk.slice(6));
          if (ev.type === "text") {
            if (!current) current = addBubble("msg-assistant", "");
            current.textContent += ev.text;
            pane.scrollTop = pane.scrollHeight;
          } else if (ev.type === "tool_use") {
            current = null;
            addBubble("tool-trace",
              `→ ${ev.name}(${JSON.stringify(ev.input)})`);
          } else if (ev.type === "tool_result") {
            const preview = String(ev.content ?? "").slice(0, 300);
            addBubble("tool-trace" + (ev.is_error ? " err" : ""),
              `← ${preview}`);
          } else if (ev.type === "error") {
            addBubble("tool-trace err", ev.error);
          }
        }
      }
    } catch (e) {
      addBubble("tool-trace err", "connection lost: " + e.message);
    } finally {
      $("chat-send").disabled = false;
    }
  }

  $("chat-send").onclick = sendChat;
  $("chat-text").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
  $("chat-clear").onclick = async () => {
    await jsend("/api/v1/chat", "DELETE");
    pane.innerHTML = "";
  };
  loadChatStatus();
</script>
{% endblock %}
